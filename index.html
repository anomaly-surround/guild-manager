<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Guild Manager</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e6f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #0f1623, #1a1040);
            border-bottom: 2px solid #2a1f5e;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5em;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1e293b;
        }

        .user-name {
            font-size: 0.9em;
            color: #94a3b8;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-discord {
            background: #5865F2;
            color: white;
            font-size: 1em;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-discord:hover { background: #4752C4; }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: white;
        }

        .btn-primary:hover { background: linear-gradient(135deg, #6d28d9, #4f46e5); }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8em;
        }

        .btn-danger {
            background: transparent;
            color: #ef4444;
            border: 1px solid #7f1d1d;
        }

        .btn-danger:hover { background: #7f1d1d33; }

        .btn-secondary {
            background: #1e293b;
            color: #94a3b8;
        }

        .btn-secondary:hover { background: #334155; color: #e0e6f0; }

        .btn-logout {
            background: transparent;
            color: #64748b;
            padding: 6px 12px;
            font-size: 0.8em;
        }

        .btn-logout:hover { color: #ef4444; }

        /* Login screen */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            gap: 16px;
        }

        .login-screen h2 {
            font-size: 2em;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-screen p {
            color: #64748b;
            margin-bottom: 12px;
        }

        /* Cards */
        .card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 1.1em;
            color: #a78bfa;
            margin-bottom: 12px;
        }

        .card h3 {
            font-size: 1em;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        /* Form */
        .form-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .form-group label {
            font-size: 0.75em;
            color: #7a8baa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e0e6f0;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.95em;
            outline: none;
        }

        .form-group input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 2px rgba(167,139,250,0.2);
        }

        /* Team list */
        .team-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .team-card:hover { border-color: #a78bfa; background: #1e293b; }

        .team-name {
            font-size: 1.1em;
            font-weight: 600;
        }

        .team-meta {
            font-size: 0.8em;
            color: #64748b;
            margin-top: 4px;
        }

        .team-role {
            font-size: 0.7em;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .team-role.leader { background: #7f1d1d; color: #fca5a5; }
        .team-role.officer { background: #78350f; color: #fcd34d; }
        .team-role.member { background: #064e3b; color: #6ee7b7; }

        /* Member list */
        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: #0f1623;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .member-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1e293b;
        }

        .member-info { flex: 1; }

        .member-name { font-size: 0.9em; font-weight: 600; }

        .member-role-badge {
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .member-actions {
            display: flex;
            gap: 6px;
        }

        /* Invite section */
        .invite-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0f1623;
            border: 1px dashed #334155;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 12px;
        }

        .invite-code {
            font-family: monospace;
            font-size: 1.1em;
            color: #a78bfa;
            font-weight: 600;
            flex: 1;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: #1e293b;
            border: 1px solid #a78bfa;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e0e6f0;
            font-weight: 600;
            animation: slide-in 0.3s ease-out;
            font-size: 0.9em;
        }

        @keyframes slide-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #475569;
        }

        /* Boss timers */
        .boss-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #0f1623;
            border: 1px solid #1e293b;
            border-radius: 8px;
            margin-bottom: 8px;
            position: relative;
        }

        .boss-item.spawning {
            border-color: #7f1d1d;
            animation: pulse-red 1.5s ease-in-out infinite;
        }

        .boss-item.warning { border-color: #78350f; }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 5px rgba(239,68,68,0.2); }
            50% { box-shadow: 0 0 15px rgba(239,68,68,0.4); }
        }

        .boss-name-text { font-weight: 600; font-size: 0.95em; }
        .boss-meta-text { font-size: 0.75em; color: #64748b; margin-top: 2px; }
        .boss-death-text { font-size: 0.7em; color: #f59e0b; margin-top: 2px; }

        .boss-countdown {
            font-size: 1.4em;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 100px;
            text-align: right;
        }

        .boss-countdown.active { color: #34d399; }
        .boss-countdown.warning-text { color: #f59e0b; }
        .boss-countdown.spawned { color: #ef4444; }

        .boss-actions { display: flex; gap: 6px; }

        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .collapsible-body { overflow: hidden; max-height: 0; transition: max-height 0.3s ease-out; }
        .collapsible-body.open { max-height: 2000px; }

        .toggle-arrow { font-size: 0.8em; color: #64748b; transition: transform 0.2s; }
        .toggle-arrow.open { transform: rotate(180deg); }

        .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; }

        .tab-btn {
            padding: 8px 16px;
            background: #1e293b;
            color: #64748b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
        }

        .tab-btn:hover { color: #e0e6f0; }
        .tab-btn.active { background: #334155; color: #a78bfa; }

        /* Events */
        .event-card {
            background: #0f1623;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .event-card.past { opacity: 0.5; }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .event-title { font-weight: 600; font-size: 1em; }

        .event-type-badge {
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .event-type-badge.scrim { background: #1e3a5f; color: #60a5fa; }
        .event-type-badge.raid { background: #7f1d1d; color: #fca5a5; }
        .event-type-badge.gvg { background: #581c87; color: #c084fc; }
        .event-type-badge.other { background: #1e293b; color: #94a3b8; }

        .event-time { font-size: 0.85em; color: #7a8baa; margin-top: 4px; }
        .event-desc { font-size: 0.8em; color: #64748b; margin-top: 6px; }

        .rsvp-bar {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            align-items: center;
        }

        .rsvp-btn {
            padding: 5px 12px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 600;
            transition: all 0.15s;
        }

        .rsvp-btn:hover { border-color: #a78bfa; color: #e0e6f0; }
        .rsvp-btn.active-going { background: #065f46; border-color: #065f46; color: #34d399; }
        .rsvp-btn.active-maybe { background: #78350f; border-color: #78350f; color: #fcd34d; }
        .rsvp-btn.active-not { background: #7f1d1d; border-color: #7f1d1d; color: #fca5a5; }

        .rsvp-counts {
            font-size: 0.75em;
            color: #64748b;
            margin-left: auto;
        }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 onclick="goHome()"><img src="icon.svg" alt="" style="height:1.2em;vertical-align:middle;margin-right:6px;">Guild Manager</h1>
        <div class="user-info" id="userInfo" style="display:none">
            <img class="user-avatar" id="userAvatar" src="">
            <span class="user-name" id="userName"></span>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container" id="mainContent">
        <!-- Content injected by JS -->
    </div>

    <div id="deathModal"></div>
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API = 'https://guild-manager.xpropics.workers.dev';
        let token = localStorage.getItem('gm_token') || '';
        let currentUser = null;
        let currentTeamId = null;

        // --- Init ---

        // Check for token in URL (from OAuth redirect)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('token')) {
            token = urlParams.get('token');
            localStorage.setItem('gm_token', token);
            window.history.replaceState({}, '', window.location.pathname);
        }

        init();

        async function init() {
            if (!token) {
                showLogin();
                return;
            }
            const user = await api('GET', '/auth/me');
            if (!user || user.error) {
                localStorage.removeItem('gm_token');
                token = '';
                showLogin();
                return;
            }
            currentUser = user;
            showUserInfo();
            showTeamList();
        }

        // --- API ---

        async function api(method, path, body) {
            const opts = {
                method,
                headers: { 'Content-Type': 'application/json' },
            };
            if (token) opts.headers['Authorization'] = `Bearer ${token}`;
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(API + path, opts);
            return res.json();
        }

        // --- Views ---

        function showLogin() {
            document.getElementById('mainContent').innerHTML = `
                <div class="login-screen">
                    <h2>Guild Manager</h2>
                    <p>Manage your gaming team, track boss spawns, schedule events</p>
                    <button class="btn btn-discord" onclick="login()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                        Login with Discord
                    </button>
                </div>
            `;
        }

        function showUserInfo() {
            const el = document.getElementById('userInfo');
            el.style.display = 'flex';
            document.getElementById('userName').textContent = currentUser.username +
                (currentUser.premium ? ' (Premium)' : '');
            if (currentUser.avatar) {
                document.getElementById('userAvatar').src =
                    `https://cdn.discordapp.com/avatars/${currentUser.discordId}/${currentUser.avatar}.png?size=64`;
            }
        }

        async function showTeamList() {
            currentTeamId = null;
            const content = document.getElementById('mainContent');
            content.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';

            const data = await api('GET', '/api/teams');
            const teams = data.teams || [];

            let html = `
                <div class="card">
                    <h2>Create Team</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Team Name</label>
                            <input type="text" id="teamName" placeholder="e.g. Shadow Guild">
                        </div>
                        <div>
                            <button class="btn btn-primary" onclick="createTeam()">Create</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>Join Team</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Invite Code</label>
                            <input type="text" id="inviteCode" placeholder="e.g. AbCd1234">
                        </div>
                        <div>
                            <button class="btn btn-primary" onclick="joinTeam()">Join</button>
                        </div>
                    </div>
                </div>

                <h3 style="color:#94a3b8;margin:20px 0 12px">Your Teams</h3>
            `;

            if (!currentUser.premium) {
                html += `
                    <div class="card" style="border-color:#7c3aed;margin-bottom:16px">
                        <h2 style="color:#a78bfa">Upgrade to Premium</h2>
                        <p style="color:#94a3b8;font-size:0.9em;margin-bottom:12px">Unlimited teams, up to 50 members per team</p>
                        <div style="display:flex;gap:10px">
                            <button class="btn btn-primary" onclick="checkout('monthly')">Monthly Plan</button>
                            <button class="btn btn-primary" onclick="checkout('lifetime')">Lifetime (one-time)</button>
                        </div>
                    </div>
                `;
            }

            if (teams.length === 0) {
                html += '<div class="empty-state">No teams yet. Create or join one above.</div>';
            } else {
                for (const t of teams) {
                    html += `
                        <div class="team-card" onclick="openTeam('${t.id}')">
                            <div>
                                <div class="team-name">${t.name}</div>
                                <div class="team-meta">${t.member_count} member${t.member_count !== 1 ? 's' : ''}</div>
                            </div>
                            <span class="team-role ${t.role}">${t.role}</span>
                        </div>
                    `;
                }
            }

            content.innerHTML = html;
        }

        let teamBosses = [];
        let teamData = null;
        let teamTab = 'timers';

        async function openTeam(teamId) {
            currentTeamId = teamId;
            const content = document.getElementById('mainContent');
            content.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';

            const data = await api('GET', `/api/teams/${teamId}`);
            if (data.error) { showToast(data.error); showTeamList(); return; }

            teamData = data;
            teamTab = 'timers';
            await loadTeamBosses(teamId);
            renderTeamView();
        }

        async function loadTeamBosses(teamId) {
            const data = await api('GET', `/api/teams/${teamId}/bosses`);
            teamBosses = data.bosses || [];
        }

        function renderTeamView() {
            const content = document.getElementById('mainContent');
            const team = teamData.team;
            const members = teamData.members;
            const canManage = team.my_role === 'leader' || team.my_role === 'officer';

            let html = `
                <button class="btn btn-secondary btn-sm" onclick="showTeamList()" style="margin-bottom:16px">&larr; Back</button>
                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:center">
                        <h2>${team.name}</h2>
                        <span class="team-role ${team.my_role}">${team.my_role}</span>
                    </div>
                    <div class="invite-box">
                        <span style="color:#64748b;font-size:0.85em">Invite Code:</span>
                        <span class="invite-code">${team.invite_code}</span>
                        <button class="btn btn-sm btn-secondary" onclick="copyInvite('${team.invite_code}')">Copy</button>
                    </div>
                </div>

                <div class="tab-bar">
                    <button class="tab-btn ${teamTab === 'timers' ? 'active' : ''}" onclick="teamTab='timers';renderTeamView()">Boss Timers</button>
                    <button class="tab-btn ${teamTab === 'events' ? 'active' : ''}" onclick="teamTab='events';loadAndRenderEvents()">Events</button>
                    <button class="tab-btn ${teamTab === 'members' ? 'active' : ''}" onclick="teamTab='members';renderTeamView()">Members (${members.length})</button>
                    <button class="tab-btn ${teamTab === 'settings' ? 'active' : ''}" onclick="teamTab='settings';renderTeamSettings()">Settings</button>
                </div>
            `;

            if (teamTab === 'timers') {
                html += renderTimersTab(team, canManage);
            } else if (teamTab === 'members') {
                html += renderMembersTab(team, members, canManage);
            } else if (teamTab === 'events') {
                html += '<div id="eventsContent"><div class="empty-state">Loading...</div></div>';
            }

            content.innerHTML = html;
        }

        function renderTimersTab(team, canManage) {
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            let html = `
                <div class="card">
                    <div class="collapsible-header" onclick="toggleSection('addBossForm', this)">
                        <h3>+ Add Boss</h3>
                        <span class="toggle-arrow">&#9660;</span>
                    </div>
                    <div class="collapsible-body" id="addBossForm">
                        <div class="form-row" style="margin-top:12px">
                            <div class="form-group">
                                <label>Boss Name</label>
                                <input type="text" id="bossName" placeholder="e.g. Dragon Lord">
                            </div>
                            <div class="form-group" style="max-width:160px">
                                <label>Type</label>
                                <select id="bossType" onchange="toggleBossInputs()" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px">
                                    <option value="interval">Interval</option>
                                    <option value="fixed">Daily</option>
                                    <option value="weekly">Weekly</option>
                                    <option value="biweekly">Twice a Week</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row" style="margin-top:8px" id="bossIntervalRow">
                            <div class="form-group" style="max-width:80px">
                                <label>Hours</label>
                                <input type="number" id="bossHours" min="0" placeholder="H">
                            </div>
                            <div class="form-group" style="max-width:80px">
                                <label>Minutes</label>
                                <input type="number" id="bossMinutes" min="0" max="59" placeholder="M">
                            </div>
                        </div>
                        <div class="form-row" style="margin-top:8px;display:none" id="bossFixedRow">
                            <div class="form-group" style="max-width:150px">
                                <label>Time</label>
                                <input type="time" id="bossFixedTime">
                            </div>
                        </div>
                        <div class="form-row" style="margin-top:8px;display:none" id="bossWeeklyRow">
                            <div class="form-group" style="max-width:120px">
                                <label>Day</label>
                                <select id="bossWeeklyDay" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px">
                                    <option value="0">Sunday</option><option value="1">Monday</option><option value="2">Tuesday</option>
                                    <option value="3">Wednesday</option><option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option>
                                </select>
                            </div>
                            <div class="form-group" style="max-width:150px">
                                <label>Time</label>
                                <input type="time" id="bossWeeklyTime">
                            </div>
                        </div>
                        <div style="margin-top:8px;display:none" id="bossBiweeklyRow">
                            <div class="form-row">
                                <div class="form-group" style="max-width:120px">
                                    <label>Day 1</label>
                                    <select id="bossBiDay1" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px">
                                        <option value="0">Sun</option><option value="1">Mon</option><option value="2">Tue</option>
                                        <option value="3">Wed</option><option value="4">Thu</option><option value="5">Fri</option><option value="6">Sat</option>
                                    </select>
                                </div>
                                <div class="form-group" style="max-width:150px">
                                    <label>Time 1</label>
                                    <input type="time" id="bossBiTime1">
                                </div>
                            </div>
                            <div class="form-row" style="margin-top:6px">
                                <div class="form-group" style="max-width:120px">
                                    <label>Day 2</label>
                                    <select id="bossBiDay2" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px">
                                        <option value="0">Sun</option><option value="1">Mon</option><option value="2">Tue</option>
                                        <option value="3">Wed</option><option value="4">Thu</option><option value="5">Fri</option><option value="6">Sat</option>
                                    </select>
                                </div>
                                <div class="form-group" style="max-width:150px">
                                    <label>Time 2</label>
                                    <input type="time" id="bossBiTime2">
                                </div>
                            </div>
                        </div>
                        <div class="form-row" style="margin-top:8px">
                            <div class="form-group" style="max-width:100px">
                                <label>Alert (min)</label>
                                <input type="number" id="bossAlert" value="5" min="1" max="60">
                            </div>
                            <div><button class="btn btn-primary" onclick="addBoss()">Add Boss</button></div>
                        </div>
                    </div>
                </div>
            `;

            // Boss list
            if (teamBosses.length === 0) {
                html += '<div class="empty-state">No boss timers yet</div>';
            } else {
                const sorted = [...teamBosses].sort((a, b) => {
                    if (a.status === 'spawned' && b.status !== 'spawned') return -1;
                    if (b.status === 'spawned' && a.status !== 'spawned') return 1;
                    return a.next_spawn - b.next_spawn;
                });

                for (const boss of sorted) {
                    const now = Date.now();
                    const remaining = boss.next_spawn - now;
                    const alertMs = boss.alert_minutes * 60000;
                    const isSpawned = remaining <= 0 || boss.status === 'spawned';
                    const isWarning = !isSpawned && remaining <= alertMs;

                    let cls = 'boss-item';
                    if (isSpawned) cls += ' spawning';
                    else if (isWarning) cls += ' warning';

                    let countdownCls = 'boss-countdown active';
                    let countdownText = formatTime(remaining);
                    if (isSpawned) { countdownCls = 'boss-countdown spawned'; countdownText = 'SPAWNED'; }
                    else if (isWarning) { countdownCls = 'boss-countdown warning-text'; }

                    const fullDayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
                    let meta = '';
                    if (boss.type === 'interval') {
                        const totalMin = boss.interval_ms / 60000;
                        const h = Math.floor(totalMin / 60), m = totalMin % 60;
                        meta = 'Every ' + (h > 0 ? h + 'h ' : '') + (m > 0 ? m + 'm' : '');
                    } else if (boss.type === 'fixed') {
                        meta = 'Daily at ' + boss.fixed_time;
                    } else if (boss.type === 'weekly') {
                        meta = fullDayNames[boss.weekly_day] + ' at ' + boss.weekly_time;
                    } else if (boss.type === 'biweekly') {
                        try {
                            const days = typeof boss.biweekly_days === 'string' ? JSON.parse(boss.biweekly_days) : boss.biweekly_days;
                            meta = days.map(d => dayNames[d.day] + ' ' + d.time).join(' & ');
                        } catch { meta = 'Twice a week'; }
                    }

                    html += `
                        <div class="${cls}" data-boss-id="${boss.id}">
                            <div style="flex:1">
                                <div class="boss-name-text">${boss.name}</div>
                                <div class="boss-meta-text">${meta} | Alert: ${boss.alert_minutes}m</div>
                                ${boss.last_death ? `<div class="boss-death-text">Killed: ${new Date(boss.last_death).toLocaleString()}</div>` : ''}
                            </div>
                            <div class="${countdownCls}">${countdownText}</div>
                            <div class="boss-actions">
                                <button class="btn btn-sm" style="background:#065f46;color:#34d399" onclick="killBoss('${boss.id}')">Killed</button>
                                <button class="btn btn-sm" style="background:#1e3a5f;color:#60a5fa" onclick="openDeathModal('${boss.id}','${boss.name}')">Set Death</button>
                                ${canManage ? `<button class="btn btn-danger btn-sm" onclick="deleteBoss('${boss.id}')">X</button>` : ''}
                            </div>
                        </div>
                    `;
                }
            }

            return html;
        }

        function renderMembersTab(team, members, canManage) {
            const isLeader = team.my_role === 'leader';
            let html = '<div class="card"><h3>Members (' + members.length + '/' + team.max_members + ')</h3>';

            for (const m of members) {
                const avatarUrl = m.avatar ? `https://cdn.discordapp.com/avatars/${m.discord_id}/${m.avatar}.png?size=64` : '';
                const isMe = m.id === currentUser.id;
                const isMemberLeader = m.role === 'leader';

                html += `
                    <div class="member-item">
                        <img class="member-avatar" src="${avatarUrl}" onerror="this.style.background='#334155'">
                        <div class="member-info"><div class="member-name">${m.username}${isMe ? ' (you)' : ''}</div></div>
                        <span class="member-role-badge team-role ${m.role}">${m.role}</span>
                        ${canManage && !isMe && !isMemberLeader ? `
                            <div class="member-actions">
                                ${isLeader ? `
                                    <select onchange="changeRole('${currentTeamId}','${m.id}',this.value)" style="background:#1e293b;color:#e0e6f0;border:1px solid #334155;border-radius:4px;padding:4px;font-size:0.75em">
                                        <option value="member" ${m.role === 'member' ? 'selected' : ''}>Member</option>
                                        <option value="officer" ${m.role === 'officer' ? 'selected' : ''}>Officer</option>
                                    </select>
                                ` : ''}
                                <button class="btn btn-danger btn-sm" onclick="kickMember('${currentTeamId}','${m.id}','${m.username}')">Kick</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            html += '</div>';
            if (isLeader) html += `<button class="btn btn-danger" onclick="deleteTeam('${currentTeamId}')" style="margin-top:12px">Delete Team</button>`;
            else html += `<button class="btn btn-danger" onclick="leaveTeam('${currentTeamId}')" style="margin-top:12px">Leave Team</button>`;
            return html;

        async function renderTeamSettings() {
            teamTab = 'settings';
            const content = document.getElementById('mainContent');
            const team = teamData.team;
            const canManage = team.my_role === 'leader' || team.my_role === 'officer';

            const settings = await api('GET', `/api/teams/${currentTeamId}/settings`);

            let html = `
                <button class="btn btn-secondary btn-sm" onclick="showTeamList()" style="margin-bottom:16px">&larr; Back</button>
                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:center">
                        <h2>${team.name}</h2>
                        <span class="team-role ${team.my_role}">${team.my_role}</span>
                    </div>
                </div>

                <div class="tab-bar">
                    <button class="tab-btn" onclick="teamTab='timers';loadTeamBosses(currentTeamId).then(()=>renderTeamView())">Boss Timers</button>
                    <button class="tab-btn" onclick="loadAndRenderEvents()">Events</button>
                    <button class="tab-btn" onclick="teamTab='members';renderTeamView()">Members</button>
                    <button class="tab-btn active">Settings</button>
                </div>

                <div class="card">
                    <h3>Discord Webhook</h3>
                    ${canManage ? `
                        <div class="form-row" style="margin-top:8px">
                            <div class="form-group">
                                <label>Webhook URL</label>
                                <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..." value="${settings.webhookUrl || ''}">
                            </div>
                            <div><button class="btn btn-primary btn-sm" onclick="saveWebhook()">Save</button></div>
                            <div><button class="btn btn-secondary btn-sm" onclick="testWebhook()">Test</button></div>
                        </div>
                        <div style="margin-top:10px;display:flex;gap:16px;font-size:0.85em;color:#94a3b8">
                            <label><input type="checkbox" id="onWarning" ${settings.onWarning ? 'checked' : ''} onchange="saveNotifSettings()" style="accent-color:#5865F2"> Warning before spawn</label>
                            <label><input type="checkbox" id="onSpawn" ${settings.onSpawn ? 'checked' : ''} onchange="saveNotifSettings()" style="accent-color:#5865F2"> Spawn notification</label>
                        </div>
                    ` : `<p style="color:#64748b;font-size:0.85em">Only officers and leaders can manage settings.</p>`}
                </div>
            `;

            content.innerHTML = html;
        }

        // --- Boss timer actions ---

        function toggleBossInputs() {
            const type = document.getElementById('bossType').value;
            document.getElementById('bossIntervalRow').style.display = type === 'interval' ? '' : 'none';
            document.getElementById('bossFixedRow').style.display = type === 'fixed' ? '' : 'none';
            document.getElementById('bossWeeklyRow').style.display = type === 'weekly' ? '' : 'none';
            document.getElementById('bossBiweeklyRow').style.display = type === 'biweekly' ? '' : 'none';
        }

        function toggleSection(id, el) {
            document.getElementById(id).classList.toggle('open');
            el.querySelector('.toggle-arrow').classList.toggle('open');
        }

        async function addBoss() {
            const name = document.getElementById('bossName').value.trim();
            if (!name) return;
            const type = document.getElementById('bossType').value;
            const alertMinutes = parseInt(document.getElementById('bossAlert').value) || 5;

            const body = { name, type, alertMinutes };

            if (type === 'interval') {
                const h = parseInt(document.getElementById('bossHours').value) || 0;
                const m = parseInt(document.getElementById('bossMinutes').value) || 0;
                if (h === 0 && m === 0) return;
                body.intervalMs = (h * 3600 + m * 60) * 1000;
            } else if (type === 'fixed') {
                body.fixedTime = document.getElementById('bossFixedTime').value;
                if (!body.fixedTime) return;
            } else if (type === 'weekly') {
                body.weeklyDay = parseInt(document.getElementById('bossWeeklyDay').value);
                body.weeklyTime = document.getElementById('bossWeeklyTime').value;
                if (!body.weeklyTime) return;
            } else if (type === 'biweekly') {
                const time1 = document.getElementById('bossBiTime1').value;
                const time2 = document.getElementById('bossBiTime2').value;
                if (!time1 || !time2) return;
                body.biweeklyDays = [
                    { day: parseInt(document.getElementById('bossBiDay1').value), time: time1 },
                    { day: parseInt(document.getElementById('bossBiDay2').value), time: time2 },
                ];
            }

            const data = await api('POST', `/api/teams/${currentTeamId}/bosses`, body);
            if (data.error) { showToast(data.error); return; }
            showToast(`${name} added`);
            await loadTeamBosses(currentTeamId);
            renderTeamView();
        }

        async function killBoss(bossId) {
            await api('POST', `/api/teams/${currentTeamId}/bosses/${bossId}/kill`, { deathTime: Date.now() });
            await loadTeamBosses(currentTeamId);
            renderTeamView();
        }

        function openDeathModal(bossId, bossName) {
            const now = new Date();
            const defaultDate = now.toISOString().slice(0, 10);
            const defaultTime = now.toTimeString().slice(0, 5);
            document.getElementById('deathModal').innerHTML = `
                <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:2000" onclick="closeDeathModal(event)">
                    <div class="card" style="min-width:320px;margin:0" onclick="event.stopPropagation()">
                        <h3 style="color:#a78bfa;margin-bottom:16px">Set Death Time: ${bossName}</h3>
                        <div class="form-group" style="margin-bottom:12px">
                            <label>Date</label>
                            <input type="date" id="deathDate" value="${defaultDate}">
                        </div>
                        <div class="form-group" style="margin-bottom:16px">
                            <label>Time</label>
                            <input type="time" id="deathTime" value="${defaultTime}" step="60">
                        </div>
                        <div style="display:flex;gap:8px;justify-content:flex-end">
                            <button class="btn btn-secondary" onclick="closeDeathModal()">Cancel</button>
                            <button class="btn btn-primary" onclick="confirmDeathTime('${bossId}')">Set Death Time</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function closeDeathModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('deathModal').innerHTML = '';
        }

        async function confirmDeathTime(bossId) {
            const dateVal = document.getElementById('deathDate').value;
            const timeVal = document.getElementById('deathTime').value;
            if (!dateVal || !timeVal) return;
            const deathTime = new Date(`${dateVal}T${timeVal}`).getTime();
            if (isNaN(deathTime)) return;
            await api('POST', `/api/teams/${currentTeamId}/bosses/${bossId}/kill`, { deathTime });
            closeDeathModal();
            showToast('Death time updated');
            await loadTeamBosses(currentTeamId);
            renderTeamView();
        }

        async function deleteBoss(bossId) {
            if (!confirm('Remove this boss timer?')) return;
            await api('DELETE', `/api/teams/${currentTeamId}/bosses/${bossId}`);
            await loadTeamBosses(currentTeamId);
            renderTeamView();
        }

        async function saveWebhook() {
            const url = document.getElementById('webhookUrl').value.trim();
            await api('PUT', `/api/teams/${currentTeamId}/settings`, { webhookUrl: url });
            showToast(url ? 'Webhook saved' : 'Webhook removed');
        }

        async function testWebhook() {
            const data = await api('POST', `/api/teams/${currentTeamId}/settings/test`);
            showToast(data.ok ? 'Test sent!' : data.error || 'Failed');
        }

        async function saveNotifSettings() {
            await api('PUT', `/api/teams/${currentTeamId}/settings`, {
                onWarning: document.getElementById('onWarning').checked,
                onSpawn: document.getElementById('onSpawn').checked,
            });
        }

        // --- Events ---

        let teamEvents = [];

        async function loadAndRenderEvents() {
            teamTab = 'events';
            renderTeamView();
            const data = await api('GET', `/api/teams/${currentTeamId}/events`);
            teamEvents = data.events || [];
            const el = document.getElementById('eventsContent');
            if (el) el.innerHTML = renderEventsContent();
        }

        function renderEventsContent() {
            const now = Date.now();
            const canManage = teamData.team.my_role === 'leader' || teamData.team.my_role === 'officer';

            let html = `
                <div class="card">
                    <div class="collapsible-header" onclick="toggleSection('addEventForm', this)">
                        <h3>+ Create Event</h3>
                        <span class="toggle-arrow">&#9660;</span>
                    </div>
                    <div class="collapsible-body" id="addEventForm">
                        <div class="form-row" style="margin-top:12px">
                            <div class="form-group">
                                <label>Title</label>
                                <input type="text" id="eventTitle" placeholder="e.g. Guild War">
                            </div>
                            <div class="form-group" style="max-width:140px">
                                <label>Type</label>
                                <select id="eventType" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px">
                                    <option value="scrim">Scrim</option>
                                    <option value="raid">Raid</option>
                                    <option value="gvg">GvG</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row" style="margin-top:8px">
                            <div class="form-group">
                                <label>Date & Time</label>
                                <input type="datetime-local" id="eventDateTime" style="color-scheme:dark">
                            </div>
                            <div class="form-group" style="max-width:100px">
                                <label>Duration (min)</label>
                                <input type="number" id="eventDuration" value="60" min="15">
                            </div>
                        </div>
                        <div class="form-group" style="margin-top:8px">
                            <label>Description (optional)</label>
                            <input type="text" id="eventDesc" placeholder="Details, links, etc.">
                        </div>
                        <div style="margin-top:10px">
                            <button class="btn btn-primary" onclick="addEvent()">Create Event</button>
                        </div>
                    </div>
                </div>
            `;

            // Split into upcoming and past
            const upcoming = teamEvents.filter(e => e.event_time + (e.duration_minutes || 60) * 60000 > now);
            const past = teamEvents.filter(e => e.event_time + (e.duration_minutes || 60) * 60000 <= now);

            if (upcoming.length === 0 && past.length === 0) {
                html += '<div class="empty-state">No events yet</div>';
            }

            if (upcoming.length > 0) {
                html += '<h3 style="color:#94a3b8;margin:16px 0 10px">Upcoming</h3>';
                for (const e of upcoming) html += renderEventCard(e, canManage, false);
            }

            if (past.length > 0) {
                html += '<h3 style="color:#64748b;margin:16px 0 10px">Past</h3>';
                for (const e of past.slice(-10).reverse()) html += renderEventCard(e, canManage, true);
            }

            return html;
        }

        function renderEventCard(e, canManage, isPast) {
            const eventDate = new Date(e.event_time);
            const dateStr = eventDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            const timeStr = eventDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            const remaining = e.event_time - Date.now();
            const isStarting = remaining <= 0 && remaining > -(e.duration_minutes || 60) * 60000;

            let countdown = '';
            if (isStarting) countdown = '<span style="color:#ef4444;font-weight:600"> LIVE NOW</span>';
            else if (remaining > 0) countdown = ` (in ${formatTimeLong(remaining)})`;

            return `
                <div class="event-card ${isPast ? 'past' : ''}">
                    <div class="event-header">
                        <div>
                            <span class="event-title">${e.title}</span>
                            <span class="event-type-badge ${e.event_type}">${e.event_type}</span>
                        </div>
                        ${canManage || e.created_by === currentUser?.id ? `<button class="btn btn-danger btn-sm" onclick="deleteEvent('${e.id}')">X</button>` : ''}
                    </div>
                    <div class="event-time">${dateStr} at ${timeStr} (${e.duration_minutes || 60}min)${countdown}</div>
                    ${e.description ? `<div class="event-desc">${e.description}</div>` : ''}
                    <div class="event-time" style="margin-top:4px;font-size:0.75em">by ${e.creator_name}</div>
                    <div class="rsvp-bar">
                        <button class="rsvp-btn ${e.my_rsvp === 'going' ? 'active-going' : ''}" onclick="rsvpEvent('${e.id}','going')">Going</button>
                        <button class="rsvp-btn ${e.my_rsvp === 'maybe' ? 'active-maybe' : ''}" onclick="rsvpEvent('${e.id}','maybe')">Maybe</button>
                        <button class="rsvp-btn ${e.my_rsvp === 'not_going' ? 'active-not' : ''}" onclick="rsvpEvent('${e.id}','not_going')">Can't</button>
                        <span class="rsvp-counts">${e.going_count} going &middot; ${e.maybe_count} maybe &middot; ${e.not_going_count} can't</span>
                    </div>
                </div>
            `;
        }

        function formatTimeLong(ms) {
            const totalMin = Math.floor(ms / 60000);
            if (totalMin < 60) return totalMin + 'min';
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            if (h < 24) return h + 'h ' + (m > 0 ? m + 'm' : '');
            const d = Math.floor(h / 24);
            return d + 'd ' + (h % 24) + 'h';
        }

        async function addEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const dateTime = document.getElementById('eventDateTime').value;
            if (!title || !dateTime) return showToast('Title and date/time required');

            const eventTime = new Date(dateTime).getTime();
            if (isNaN(eventTime)) return;

            const data = await api('POST', `/api/teams/${currentTeamId}/events`, {
                title,
                eventType: document.getElementById('eventType').value,
                eventTime,
                durationMinutes: parseInt(document.getElementById('eventDuration').value) || 60,
                description: document.getElementById('eventDesc').value.trim() || null,
            });

            if (data.error) { showToast(data.error); return; }
            showToast(`Event "${title}" created`);
            loadAndRenderEvents();
        }

        async function rsvpEvent(eventId, status) {
            await api('POST', `/api/teams/${currentTeamId}/events/${eventId}/rsvp`, { status });
            loadAndRenderEvents();
        }

        async function deleteEvent(eventId) {
            if (!confirm('Delete this event?')) return;
            await api('DELETE', `/api/teams/${currentTeamId}/events/${eventId}`);
            showToast('Event deleted');
            loadAndRenderEvents();
        }

        function formatTime(ms) {
            if (ms <= 0) return '00:00';
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
            return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }

        // Tick — update countdown text only, don't re-render
        setInterval(() => {
            if (!currentTeamId || teamTab !== 'timers') return;
            for (const boss of teamBosses) {
                const el = document.querySelector(`[data-boss-id="${boss.id}"] .boss-countdown`);
                if (!el) continue;
                const remaining = boss.next_spawn - Date.now();
                const isSpawned = remaining <= 0 || boss.status === 'spawned';
                if (isSpawned) {
                    el.textContent = 'SPAWNED';
                    el.className = 'boss-countdown spawned';
                } else {
                    el.textContent = formatTime(remaining);
                    const alertMs = boss.alert_minutes * 60000;
                    el.className = remaining <= alertMs ? 'boss-countdown warning-text' : 'boss-countdown active';
                }
            }
        }, 1000);

        // Refresh boss data from server every 15 seconds
        setInterval(async () => {
            if (!currentTeamId || teamTab !== 'timers') return;
            await loadTeamBosses(currentTeamId);
        }, 15000);

        // --- Actions ---

        async function checkout(type) {
            const data = await api('POST', '/api/checkout', { type });
            if (data.url) {
                window.location.href = data.url;
            } else {
                showToast(data.error || 'Failed to create checkout');
            }
        }

        function login() {
            window.location.href = API + '/auth/login';
        }

        function logout() {
            localStorage.removeItem('gm_token');
            token = '';
            currentUser = null;
            document.getElementById('userInfo').style.display = 'none';
            showLogin();
        }

        async function createTeam() {
            const name = document.getElementById('teamName').value.trim();
            if (!name) return;
            const data = await api('POST', '/api/teams', { name });
            if (data.error) { showToast(data.error); return; }
            showToast(`Team "${name}" created!`);
            showTeamList();
        }

        async function joinTeam() {
            const code = document.getElementById('inviteCode').value.trim();
            if (!code) return;
            const data = await api('POST', `/api/invite/${code}`);
            if (data.error) { showToast(data.error); return; }
            showToast(`Joined ${data.team.name}!`);
            showTeamList();
        }

        async function changeRole(teamId, userId, role) {
            await api('POST', `/api/teams/${teamId}/members/role`, { userId, role });
            openTeam(teamId);
        }

        async function kickMember(teamId, userId, username) {
            if (!confirm(`Kick ${username}?`)) return;
            await api('POST', `/api/teams/${teamId}/kick`, { userId });
            showToast(`${username} kicked`);
            openTeam(teamId);
        }

        async function deleteTeam(teamId) {
            if (!confirm('Delete this team? This cannot be undone.')) return;
            await api('DELETE', `/api/teams/${teamId}`);
            showToast('Team deleted');
            showTeamList();
        }

        async function leaveTeam(teamId) {
            if (!confirm('Leave this team?')) return;
            await api('POST', `/api/teams/${teamId}/leave`);
            showToast('Left team');
            showTeamList();
        }

        function copyInvite(code) {
            navigator.clipboard.writeText(code);
            showToast('Invite code copied!');
        }

        function goHome() {
            if (currentUser) showTeamList();
            else showLogin();
        }

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>
</html>
