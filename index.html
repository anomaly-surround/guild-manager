<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e6f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #0f1623, #1a1040);
            border-bottom: 2px solid #2a1f5e;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5em;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1e293b;
        }

        .user-name {
            font-size: 0.9em;
            color: #94a3b8;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-discord {
            background: #5865F2;
            color: white;
            font-size: 1em;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-discord:hover { background: #4752C4; }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: white;
        }

        .btn-primary:hover { background: linear-gradient(135deg, #6d28d9, #4f46e5); }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8em;
        }

        .btn-danger {
            background: transparent;
            color: #ef4444;
            border: 1px solid #7f1d1d;
        }

        .btn-danger:hover { background: #7f1d1d33; }

        .btn-secondary {
            background: #1e293b;
            color: #94a3b8;
        }

        .btn-secondary:hover { background: #334155; color: #e0e6f0; }

        .btn-logout {
            background: transparent;
            color: #64748b;
            padding: 6px 12px;
            font-size: 0.8em;
        }

        .btn-logout:hover { color: #ef4444; }

        /* Login screen */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            gap: 16px;
        }

        .login-screen h2 {
            font-size: 2em;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-screen p {
            color: #64748b;
            margin-bottom: 12px;
        }

        /* Cards */
        .card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 1.1em;
            color: #a78bfa;
            margin-bottom: 12px;
        }

        .card h3 {
            font-size: 1em;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        /* Form */
        .form-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .form-group label {
            font-size: 0.75em;
            color: #7a8baa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e0e6f0;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.95em;
            outline: none;
        }

        .form-group input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 2px rgba(167,139,250,0.2);
        }

        /* Team list */
        .team-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .team-card:hover { border-color: #a78bfa; background: #1e293b; }

        .team-name {
            font-size: 1.1em;
            font-weight: 600;
        }

        .team-meta {
            font-size: 0.8em;
            color: #64748b;
            margin-top: 4px;
        }

        .team-role {
            font-size: 0.7em;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .team-role.leader { background: #7f1d1d; color: #fca5a5; }
        .team-role.officer { background: #78350f; color: #fcd34d; }
        .team-role.member { background: #064e3b; color: #6ee7b7; }

        /* Member list */
        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: #0f1623;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .member-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1e293b;
        }

        .member-info { flex: 1; }

        .member-name { font-size: 0.9em; font-weight: 600; }

        .member-role-badge {
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .member-actions {
            display: flex;
            gap: 6px;
        }

        /* Invite section */
        .invite-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0f1623;
            border: 1px dashed #334155;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 12px;
        }

        .invite-code {
            font-family: monospace;
            font-size: 1.1em;
            color: #a78bfa;
            font-weight: 600;
            flex: 1;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: #1e293b;
            border: 1px solid #a78bfa;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e0e6f0;
            font-weight: 600;
            animation: slide-in 0.3s ease-out;
            font-size: 0.9em;
        }

        @keyframes slide-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #475569;
        }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 onclick="goHome()">Guild Manager</h1>
        <div class="user-info" id="userInfo" style="display:none">
            <img class="user-avatar" id="userAvatar" src="">
            <span class="user-name" id="userName"></span>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container" id="mainContent">
        <!-- Content injected by JS -->
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API = 'https://guild-manager.xpropics.workers.dev';
        let token = localStorage.getItem('gm_token') || '';
        let currentUser = null;
        let currentTeamId = null;

        // --- Init ---

        // Check for token in URL (from OAuth redirect)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('token')) {
            token = urlParams.get('token');
            localStorage.setItem('gm_token', token);
            window.history.replaceState({}, '', window.location.pathname);
        }

        init();

        async function init() {
            if (!token) {
                showLogin();
                return;
            }
            const user = await api('GET', '/auth/me');
            if (!user || user.error) {
                localStorage.removeItem('gm_token');
                token = '';
                showLogin();
                return;
            }
            currentUser = user;
            showUserInfo();
            showTeamList();
        }

        // --- API ---

        async function api(method, path, body) {
            const opts = {
                method,
                headers: { 'Content-Type': 'application/json' },
            };
            if (token) opts.headers['Authorization'] = `Bearer ${token}`;
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(API + path, opts);
            return res.json();
        }

        // --- Views ---

        function showLogin() {
            document.getElementById('mainContent').innerHTML = `
                <div class="login-screen">
                    <h2>Guild Manager</h2>
                    <p>Manage your gaming team, track boss spawns, schedule events</p>
                    <button class="btn btn-discord" onclick="login()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                        Login with Discord
                    </button>
                </div>
            `;
        }

        function showUserInfo() {
            const el = document.getElementById('userInfo');
            el.style.display = 'flex';
            document.getElementById('userName').textContent = currentUser.username;
            if (currentUser.avatar) {
                document.getElementById('userAvatar').src =
                    `https://cdn.discordapp.com/avatars/${currentUser.discordId}/${currentUser.avatar}.png?size=64`;
            }
        }

        async function showTeamList() {
            currentTeamId = null;
            const content = document.getElementById('mainContent');
            content.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';

            const data = await api('GET', '/api/teams');
            const teams = data.teams || [];

            let html = `
                <div class="card">
                    <h2>Create Team</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Team Name</label>
                            <input type="text" id="teamName" placeholder="e.g. Shadow Guild">
                        </div>
                        <div>
                            <button class="btn btn-primary" onclick="createTeam()">Create</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>Join Team</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Invite Code</label>
                            <input type="text" id="inviteCode" placeholder="e.g. AbCd1234">
                        </div>
                        <div>
                            <button class="btn btn-primary" onclick="joinTeam()">Join</button>
                        </div>
                    </div>
                </div>

                <h3 style="color:#94a3b8;margin:20px 0 12px">Your Teams</h3>
            `;

            if (teams.length === 0) {
                html += '<div class="empty-state">No teams yet. Create or join one above.</div>';
            } else {
                for (const t of teams) {
                    html += `
                        <div class="team-card" onclick="openTeam('${t.id}')">
                            <div>
                                <div class="team-name">${t.name}</div>
                                <div class="team-meta">${t.member_count} member${t.member_count !== 1 ? 's' : ''}</div>
                            </div>
                            <span class="team-role ${t.role}">${t.role}</span>
                        </div>
                    `;
                }
            }

            content.innerHTML = html;
        }

        async function openTeam(teamId) {
            currentTeamId = teamId;
            const content = document.getElementById('mainContent');
            content.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';

            const data = await api('GET', `/api/teams/${teamId}`);
            if (data.error) {
                showToast(data.error);
                showTeamList();
                return;
            }

            const team = data.team;
            const members = data.members;
            const isLeader = team.my_role === 'leader';
            const isOfficer = team.my_role === 'officer';
            const canManage = isLeader || isOfficer;

            let html = `
                <button class="btn btn-secondary btn-sm" onclick="showTeamList()" style="margin-bottom:16px">&larr; Back</button>

                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:center">
                        <h2>${team.name}</h2>
                        <span class="team-role ${team.my_role}">${team.my_role}</span>
                    </div>

                    <div class="invite-box">
                        <span style="color:#64748b;font-size:0.85em">Invite Code:</span>
                        <span class="invite-code">${team.invite_code}</span>
                        <button class="btn btn-sm btn-secondary" onclick="copyInvite('${team.invite_code}')">Copy</button>
                    </div>
                </div>

                <div class="card">
                    <h3>Members (${members.length}/${team.max_members})</h3>
            `;

            for (const m of members) {
                const avatarUrl = m.avatar
                    ? `https://cdn.discordapp.com/avatars/${m.discord_id}/${m.avatar}.png?size=64`
                    : '';
                const isMe = m.id === currentUser.id;
                const isMemberLeader = m.role === 'leader';

                html += `
                    <div class="member-item">
                        <img class="member-avatar" src="${avatarUrl}" onerror="this.style.background='#334155'">
                        <div class="member-info">
                            <div class="member-name">${m.username}${isMe ? ' (you)' : ''}</div>
                        </div>
                        <span class="member-role-badge team-role ${m.role}">${m.role}</span>
                        ${canManage && !isMe && !isMemberLeader ? `
                            <div class="member-actions">
                                ${isLeader ? `
                                    <select onchange="changeRole('${teamId}','${m.id}',this.value)" style="background:#1e293b;color:#e0e6f0;border:1px solid #334155;border-radius:4px;padding:4px;font-size:0.75em">
                                        <option value="member" ${m.role === 'member' ? 'selected' : ''}>Member</option>
                                        <option value="officer" ${m.role === 'officer' ? 'selected' : ''}>Officer</option>
                                    </select>
                                ` : ''}
                                <button class="btn btn-danger btn-sm" onclick="kickMember('${teamId}','${m.id}','${m.username}')">Kick</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            html += '</div>';

            // Leave / Delete
            if (isLeader) {
                html += `<button class="btn btn-danger" onclick="deleteTeam('${teamId}')" style="margin-top:12px">Delete Team</button>`;
            } else {
                html += `<button class="btn btn-danger" onclick="leaveTeam('${teamId}')" style="margin-top:12px">Leave Team</button>`;
            }

            content.innerHTML = html;
        }

        // --- Actions ---

        function login() {
            window.location.href = API + '/auth/login';
        }

        function logout() {
            localStorage.removeItem('gm_token');
            token = '';
            currentUser = null;
            document.getElementById('userInfo').style.display = 'none';
            showLogin();
        }

        async function createTeam() {
            const name = document.getElementById('teamName').value.trim();
            if (!name) return;
            const data = await api('POST', '/api/teams', { name });
            if (data.error) { showToast(data.error); return; }
            showToast(`Team "${name}" created!`);
            showTeamList();
        }

        async function joinTeam() {
            const code = document.getElementById('inviteCode').value.trim();
            if (!code) return;
            const data = await api('POST', `/api/invite/${code}`);
            if (data.error) { showToast(data.error); return; }
            showToast(`Joined ${data.team.name}!`);
            showTeamList();
        }

        async function changeRole(teamId, userId, role) {
            await api('POST', `/api/teams/${teamId}/members/role`, { userId, role });
            openTeam(teamId);
        }

        async function kickMember(teamId, userId, username) {
            if (!confirm(`Kick ${username}?`)) return;
            await api('POST', `/api/teams/${teamId}/kick`, { userId });
            showToast(`${username} kicked`);
            openTeam(teamId);
        }

        async function deleteTeam(teamId) {
            if (!confirm('Delete this team? This cannot be undone.')) return;
            await api('DELETE', `/api/teams/${teamId}`);
            showToast('Team deleted');
            showTeamList();
        }

        async function leaveTeam(teamId) {
            if (!confirm('Leave this team?')) return;
            await api('POST', `/api/teams/${teamId}/leave`);
            showToast('Left team');
            showTeamList();
        }

        function copyInvite(code) {
            navigator.clipboard.writeText(code);
            showToast('Invite code copied!');
        }

        function goHome() {
            if (currentUser) showTeamList();
            else showLogin();
        }

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>
</html>
