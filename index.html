            content.innerHTML = html;
        }

        // --- Boss timer actions ---

        function setBossView(mode) {
            bossViewMode = mode;
            localStorage.setItem('gm_boss_view', mode);
            renderTeamView();
        }

        function toggleBossInputs() {
            const type = document.getElementById('bossType').value;
            document.getElementById('bossIntervalRow').style.display = type === 'interval' ? '' : 'none';
            document.getElementById('bossFixedRow').style.display = type === 'fixed' ? '' : 'none';
            document.getElementById('bossWeeklyRow').style.display = type === 'weekly' ? '' : 'none';
            document.getElementById('bossBiweeklyRow').style.display = type === 'biweekly' ? '' : 'none';
        }

        function toggleSection(id, el) {
            document.getElementById(id).classList.toggle('open');
            el.querySelector('.toggle-arrow').classList.toggle('open');
        }

        const addBoss = guard('addBoss', async function() {
            const name = document.getElementById('bossName').value.trim();
            if (!name) return;
            const type = document.getElementById('bossType').value;
            const alertMinutes = parseInt(document.getElementById('bossAlert').value) || 5;

            const body = { name, type, alertMinutes };

            if (type === 'interval') {
                const h = parseInt(document.getElementById('bossHours').value) || 0;
                const m = parseInt(document.getElementById('bossMinutes').value) || 0;
                if (h === 0 && m === 0) return;
                body.intervalMs = (h * 3600 + m * 60) * 1000;
            } else if (type === 'fixed') {
                body.fixedTime = document.getElementById('bossFixedTime').value;
                if (!body.fixedTime) return;
            } else if (type === 'weekly') {
                body.weeklyDay = parseInt(document.getElementById('bossWeeklyDay').value);
                body.weeklyTime = document.getElementById('bossWeeklyTime').value;
                if (!body.weeklyTime) return;
            } else if (type === 'biweekly') {
                const time1 = document.getElementById('bossBiTime1').value;
                const time2 = document.getElementById('bossBiTime2').value;
                if (!time1 || !time2) return;
                body.biweeklyDays = [
                    { day: parseInt(document.getElementById('bossBiDay1').value), time: time1 },
                    { day: parseInt(document.getElementById('bossBiDay2').value), time: time2 },
                ];
            }

            const data = await api('POST', `/api/teams/${currentTeamId}/bosses`, body);
            if (data.error) { showToast(data.error); return; }
            showToast(`${name} added`);
            await loadTeamBosses(currentTeamId);
            renderTeamView();
        });

        const killBoss = guard('killBoss', async function(bossId) {
            await api('POST', `/api/teams/${currentTeamId}/bosses/${bossId}/kill`, { deathTime: Date.now() });
            await loadTeamBosses(currentTeamId);
            renderTeamView();
        });

        function openDeathModal(bossId, bossName) {
            const now = new Date();
            const defaultDate = now.toISOString().slice(0, 10);
            const defaultTime = now.toTimeString().slice(0, 5);
            document.getElementById('deathModal').innerHTML = `
                <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:2000" onclick="closeDeathModal(event)">
                    <div class="card" style="min-width:320px;margin:0" onclick="event.stopPropagation()">
                        <h3 style="color:#a78bfa;margin-bottom:16px">Set Death Time: ${bossName}</h3>
                        <div class="form-group" style="margin-bottom:12px">
                            <label>Date</label>
                            <input type="date" id="deathDate" value="${defaultDate}">
                        </div>
                        <div class="form-group" style="margin-bottom:16px">
                            <label>Time</label>
                            <input type="time" id="deathTime" value="${defaultTime}" step="60">
                        </div>
                        <div style="display:flex;gap:8px;justify-content:flex-end">
                            <button class="btn btn-secondary" onclick="closeDeathModal()">Cancel</button>
                            <button class="btn btn-primary" onclick="confirmDeathTime('${bossId}')">Set Death Time</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function closeDeathModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('deathModal').innerHTML = '';
        }

        async function confirmDeathTime(bossId) {
            const dateVal = document.getElementById('deathDate').value;
            const timeVal = document.getElementById('deathTime').value;
            if (!dateVal || !timeVal) return;
            const deathTime = new Date(`${dateVal}T${timeVal}`).getTime();
            if (isNaN(deathTime)) return;
            await api('POST', `/api/teams/${currentTeamId}/bosses/${bossId}/kill`, { deathTime });
            closeDeathModal();
            showToast('Death time updated');
            await loadTeamBosses(currentTeamId);
            renderTeamView();
        }

        const deleteBoss = guard('deleteBoss', async function(bossId) {
            if (!confirm('Remove this boss timer?')) return;
            await api('DELETE', `/api/teams/${currentTeamId}/bosses/${bossId}`);
            await loadTeamBosses(currentTeamId);
            renderTeamView();
        });

        const saveWebhook = guard('saveWebhook', async function() {
            const url = document.getElementById('webhookUrl').value.trim();
            await api('PUT', `/api/teams/${currentTeamId}/settings`, { webhookUrl: url });
            showToast(url ? 'Webhook saved' : 'Webhook removed');
        });

        const testWebhook = guard('testWebhook', async function() {
            const data = await api('POST', `/api/teams/${currentTeamId}/settings/test`);
            showToast(data.ok ? 'Test sent!' : data.error || 'Failed');
        });

        async function saveNotifSettings() {
            await api('PUT', `/api/teams/${currentTeamId}/settings`, {
                onWarning: document.getElementById('onWarning').checked,
                onSpawn: document.getElementById('onSpawn').checked,
                onAnnouncement: document.getElementById('onAnnouncement').checked,
                onEvent: document.getElementById('onEvent').checked,
                onWar: document.getElementById('onWar').checked,
                eventReminderMinutes: parseInt(document.getElementById('eventReminderMin').value) || 15,
            });
            showToast('Notification settings saved');
        }

        const saveTeamInfo = guard('saveTeamInfo', async function() {
            await api('PUT', `/api/teams/${currentTeamId}/settings`, {
                teamDescription: document.getElementById('teamDesc').value.trim(),
                timezone: document.getElementById('teamTimezone').value,
            });
            showToast('Team info saved');
        });

        const saveTeamRules = guard('saveTeamRules', async function() {
            await api('PUT', `/api/teams/${currentTeamId}/settings`, {
                membersCreateEvents: document.getElementById('membersCreateEvents').checked,
                defaultEventDuration: parseInt(document.getElementById('defaultEventDuration').value) || 60,
                inactiveDays: parseInt(document.getElementById('inactiveDays').value) || 7,
                startingDkp: parseInt(document.getElementById('startingDkp').value) || 0,
                pointsName: (document.getElementById('pointsName').value.trim() || 'DKP').substring(0, 20),
            });
            _pointsName = (document.getElementById('pointsName').value.trim() || 'DKP').substring(0, 20);
            showToast('Rules saved');
        });

        const saveCleanup = guard('saveCleanup', async function() {
            await api('PUT', `/api/teams/${currentTeamId}/settings`, {
                autoDeleteEventsDays: parseInt(document.getElementById('autoDeleteEvents').value) || 0,
                autoDeleteChatDays: parseInt(document.getElementById('autoDeleteChat').value) || 0,
            });
            showToast('Cleanup settings saved');
        });

        const transferOwnership = guard('transferOwnership', async function() {
            const targetId = document.getElementById('transferTarget').value;
            const targetName = document.getElementById('transferTarget').selectedOptions[0]?.text;
            if (!confirm(`Transfer ownership to ${targetName}? You'll become an officer.`)) return;
            const data = await api('POST', `/api/teams/${currentTeamId}/transfer`, { userId: targetId });
            if (data.error) { showToast(data.error); return; }
            showToast('Ownership transferred!');
            openTeam(currentTeamId);
        });

        // Premium settings save functions
        const saveChannelWebhooks = guard('saveChannelWebhooks', async function() {
            await api('PUT', `/api/teams/${currentTeamId}/settings`, {
                webhookBoss: document.getElementById('webhookBoss').value.trim(),
                webhookEvents: document.getElementById('webhookEvents').value.trim(),
                webhookWars: document.getElementById('webhookWars').value.trim(),
                webhookAnnouncements: document.getElementById('webhookAnnouncements').value.trim(),
            });
            showToast('Channel webhooks saved');
        });

        function previewTeamIcon(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 50000) { showToast('Image must be under 50KB'); input.value = ''; return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('teamIconPreview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        const saveCustomization = guard('saveCustomization', async function() {
            const accentColor = document.getElementById('accentColor').value;
            const iconImg = document.getElementById('teamIconPreview');
            const teamIcon = iconImg.src && iconImg.src.startsWith('data:') ? iconImg.src : '';
            const data = await api('PUT', `/api/teams/${currentTeamId}/settings`, { accentColor, teamIcon });
            if (data.error) { showToast(data.error); return; }
            showToast('Customization saved');
            if (accentColor) document.documentElement.style.setProperty('--accent', accentColor);
        });

        const saveCustomRoles = guard('saveCustomRoles', async function() {
            await api('PUT', `/api/teams/${currentTeamId}/roles`, {
                roles: {
                    leader: { displayName: document.getElementById('roleLeader').value.trim() },
                    officer: { displayName: document.getElementById('roleOfficer').value.trim() },
                    member: { displayName: document.getElementById('roleMember').value.trim() },
                }
            });
            showToast('Custom roles saved');
        });

        const saveDkpDecay = guard('saveDkpDecay', async function() {
            await api('PUT', `/api/teams/${currentTeamId}/settings`, {
                dkpDecayEnabled: document.getElementById('dkpDecayEnabled').checked,
                dkpDecayPercent: parseInt(document.getElementById('dkpDecayPercent').value) || 10,
                dkpDecayInactiveDays: parseInt(document.getElementById('dkpDecayInactiveDays').value) || 14,
                dkpDecayIntervalDays: parseInt(document.getElementById('dkpDecayIntervalDays').value) || 7,
            });
            showToast(ptsName() + ' decay settings saved');
        });

        // --- Mobile tab switcher ---
        function mobileTabSwitch(tab) {
            switch(tab) {
                case 'dashboard': loadAndRenderDashboard(); break;
                case 'chat': loadAndRenderChat(); break;
                case 'announcements': loadAndRenderAnnouncements(); break;
                case 'timers': teamTab='timers'; renderTeamView(); break;
                case 'events': teamTab='events'; loadAndRenderEvents(); break;
                case 'members': teamTab='members'; renderTeamView(); break;
                case 'loot': loadAndRenderLoot(); break;
                case 'dkp': loadAndRenderDKP(); break;
                case 'wars': loadAndRenderWars(); break;
                case 'availability': loadAndRenderAvailability(); break;
                case 'polls': loadAndRenderPolls(); break;
                case 'rosters': loadAndRenderRosters(); break;
                case 'performance': loadAndRenderPerformance(); break;
                case 'recruitment': loadAndRenderRecruitment(); break;
                case 'files': loadAndRenderFiles(); break;
                case 'matches': loadAndRenderMatches(); break;
                case 'analytics': loadAndRenderAnalytics(); break;
                case 'settings': teamTab='settings'; renderTeamSettings(); break;
            }
        }

        // --- Dashboard ---

        async function loadAndRenderDashboard() {
            teamTab = 'dashboard';
            renderTeamView();

            const el = document.getElementById('dashboardContent');
            if (!el) return;

            // Fetch all data in parallel with fallbacks
            const [eventsData, announcementsData, warsData, chatData] = await Promise.all([
                api('GET', `/api/teams/${currentTeamId}/events`).catch(() => ({})),
                api('GET', `/api/teams/${currentTeamId}/announcements`).catch(() => ({})),
                api('GET', `/api/teams/${currentTeamId}/wars`).catch(() => ({})),
                api('GET', `/api/teams/${currentTeamId}/chat?after=0`).catch(() => ({})),
            ]);

            const now = Date.now();
            const events = eventsData.events || [];
            const announcements = announcementsData.announcements || [];
            const wars = warsData.wars || [];
            const stats = warsData.stats || {};
            const messages = chatData.messages || [];
            const members = teamData.members || [];

            // Next boss spawn
            let nextBoss = null;
            const waitingBosses = teamBosses.filter(b => b.status === 'waiting' && b.next_spawn > now);
            if (waitingBosses.length > 0) {
                nextBoss = waitingBosses.sort((a, b) => a.next_spawn - b.next_spawn)[0];
            }
            const spawnedBosses = teamBosses.filter(b => b.status === 'spawned' || b.next_spawn <= now);

            // Next event
            const upcomingEvents = events.filter(e => e.event_time > now).sort((a, b) => a.event_time - b.event_time);
            const liveEvents = events.filter(e => e.event_time <= now && e.event_time + (e.duration_minutes || 60) * 60000 > now);

            // Latest announcement
            const latestAnnouncement = announcements[0];

            // Recent chat
            const recentMessages = messages.slice(-3);

            // Online members
            const nowSec = Math.floor(now / 1000);
            const onlineCount = members.filter(m => m.last_seen && (nowSec - m.last_seen) < 300).length;

            let html = '<div class="dash-grid">';

            // Boss Timers card
            html += `<div class="dash-card" onclick="teamTab='timers';renderTeamView()">
                <h4>Boss Timers</h4>`;
            if (spawnedBosses.length > 0) {
                html += `<div class="dash-value" style="color:#ef4444">${spawnedBosses.length} SPAWNED!</div>`;
                html += `<div class="dash-sub">${spawnedBosses.map(b => b.name).join(', ')}</div>`;
            } else if (nextBoss) {
                const remaining = nextBoss.next_spawn - now;
                html += `<div class="dash-value">${nextBoss.name}</div>`;
                html += `<div class="dash-sub">in ${formatTimeLong(remaining)}</div>`;
            } else {
                html += `<div class="dash-value" style="color:var(--text-dim)">No timers</div>`;
            }
            html += '</div>';

            // Events card
            html += `<div class="dash-card" onclick="teamTab='events';loadAndRenderEvents()">
                <h4>Events</h4>`;
            if (liveEvents.length > 0) {
                html += `<div class="dash-value" style="color:#ef4444">${liveEvents[0].title} — LIVE</div>`;
            } else if (upcomingEvents.length > 0) {
                const e = upcomingEvents[0];
                const eventDate = new Date(e.event_time);
                const dateStr = eventDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                const timeStr = eventDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                html += `<div class="dash-value">${escapeHtml(e.title)}</div>`;
                html += `<div class="dash-sub">${dateStr} at ${timeStr}</div>`;
            } else {
                html += `<div class="dash-value" style="color:var(--text-dim)">No upcoming</div>`;
            }
            html += '</div>';

            // Announcements card
            html += `<div class="dash-card" onclick="loadAndRenderAnnouncements()">
                <h4>Latest Announcement</h4>`;
            if (latestAnnouncement) {
                html += `<div class="dash-value">${latestAnnouncement.title}</div>`;
                html += `<div class="dash-sub">by ${latestAnnouncement.author_name}</div>`;
            } else {
                html += `<div class="dash-value" style="color:var(--text-dim)">None yet</div>`;
            }
            html += '</div>';

            // Wars card
            html += `<div class="dash-card" onclick="loadAndRenderWars()">
                <h4>War Record</h4>`;
            const total = (stats.wins || 0) + (stats.losses || 0) + (stats.draws || 0);
            if (total > 0) {
                const winRate = Math.round(((stats.wins || 0) / total) * 100);
                html += `<div class="dash-value"><span style="color:#34d399">${stats.wins}W</span> / <span style="color:#ef4444">${stats.losses}L</span> / <span style="color:#f59e0b">${stats.draws}D</span></div>`;
                html += `<div class="dash-sub">${winRate}% win rate</div>`;
            } else {
                html += `<div class="dash-value" style="color:var(--text-dim)">No wars yet</div>`;
            }
            html += '</div>';

            // Members card
            html += `<div class="dash-card" onclick="teamTab='members';renderTeamView()">
                <h4>Members</h4>
                <div class="dash-value">${members.length} total</div>
                <div class="dash-sub"><span style="color:#34d399">${onlineCount} online</span></div>
            </div>`;

            // Chat card
            html += `<div class="dash-card" onclick="loadAndRenderChat()">
                <h4>Recent Chat</h4>`;
            if (recentMessages.length > 0) {
                for (const m of recentMessages) {
                    html += `<div class="dash-sub" style="margin-top:2px"><b>${m.username}:</b> ${escapeHtml(m.message).substring(0, 40)}${m.message.length > 40 ? '...' : ''}</div>`;
                }
            } else {
                html += `<div class="dash-value" style="color:var(--text-dim)">No messages</div>`;
            }
            html += '</div>';

            html += '</div>';
            el.innerHTML = html;
        }

        // --- Chat ---

        let chatMessages = [];
        let chatLastTimestamp = 0;

        async function loadAndRenderChat() {
            teamTab = 'chat';
            chatMessages = [];
            chatLastTimestamp = 0;
            renderTeamView();
            await fetchChatMessages(true);
        }

        async function fetchChatMessages(fullLoad) {
            const after = fullLoad ? '0' : String(chatLastTimestamp);
            const data = await api('GET', `/api/teams/${currentTeamId}/chat?after=${after}`);
            const newMsgs = data.messages || [];
            if (newMsgs.length > 0) {
                if (fullLoad) {
                    chatMessages = newMsgs;
                } else {
                    const existingIds = new Set(chatMessages.map(m => m.id));
                    const unique = newMsgs.filter(m => !existingIds.has(m.id));
                    if (unique.length > 0) chatMessages = chatMessages.concat(unique);
                }
                chatLastTimestamp = newMsgs[newMsgs.length - 1].created_at;
            }

            if (fullLoad) {
                // Full render on first load
                const el = document.getElementById('chatContent');
                if (el) el.innerHTML = renderChatContent();
                const msgBox = document.getElementById('chatMsgBox');
                if (msgBox) msgBox.scrollTop = msgBox.scrollHeight;
            } else if (newMsgs.length > 0) {
                // Only update the messages area, preserve input
                const msgBox = document.getElementById('chatMsgBox');
                if (msgBox) {
                    const wasAtBottom = msgBox.scrollHeight - msgBox.scrollTop - msgBox.clientHeight < 50;
                    msgBox.innerHTML = renderChatMessages();
                    if (wasAtBottom) msgBox.scrollTop = msgBox.scrollHeight;
                }
            }
        }

        function renderChatMessages() {
            const canManage = teamData.team.my_role === 'leader' || teamData.team.my_role === 'officer';
            if (chatMessages.length === 0) {
                return '<div class="empty-state" style="margin:auto">No messages yet. Say hi!</div>';
            }
            let html = '';
            for (const m of chatMessages) {
                const avatarUrl = m.avatar ? `https://cdn.discordapp.com/avatars/${m.discord_id}/${m.avatar}.png?size=64` : '';
                const time = new Date(m.created_at * 1000).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                const date = new Date(m.created_at * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const canDelete = m.user_id === currentUser.id || canManage;
                html += `
                    <div class="chat-msg">
                        <img class="chat-msg-avatar" src="${avatarUrl}" onerror="this.style.background='#334155'">
                        <div class="chat-msg-body">
                            <span class="chat-msg-name">${m.username}</span>
                            <span class="chat-msg-time">${date} ${time}</span>
                            ${canDelete ? `<span class="chat-msg-time" style="cursor:pointer;color:#ef4444" onclick="deleteChat('${m.id}')">[x]</span>` : ''}
                            <div class="chat-msg-text">${escapeHtml(m.message)}</div>
                            ${renderReactions(m.id, m.reactions)}
                        </div>
                    </div>
                `;
            }
            return html;
        }

        function renderChatContent() {
            return `
                <div class="chat-container">
                    <div class="chat-messages" id="chatMsgBox">${renderChatMessages()}</div>
                    <div class="chat-input-bar">
                        <input type="text" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()" maxlength="2000">
                        <button class="btn btn-primary" onclick="sendChat()">Send</button>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        let chatSending = false;
        async function sendChat() {
            if (chatSending) return;
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            chatSending = true;
            input.value = '';
            input.disabled = true;
            try {
                const data = await api('POST', `/api/teams/${currentTeamId}/chat`, { message });
                if (data.error) { showToast(data.error); return; }
                await fetchChatMessages(false);
            } finally {
                chatSending = false;
                const inp = document.getElementById('chatInput');
                if (inp) { inp.disabled = false; inp.focus(); }
            }
        }

        async function deleteChat(id) {
            await api('DELETE', `/api/teams/${currentTeamId}/chat/${id}`);
            chatMessages = chatMessages.filter(m => m.id !== id);
            const msgBox = document.getElementById('chatMsgBox');
            if (msgBox) msgBox.innerHTML = renderChatMessages();
        }

        // --- Premium: Chat Reactions ---

        const commonEmoji = ['👍','👎','❤️','😂','😮','🔥','🎉','💀','⚔️','🛡️'];

        function renderReactions(msgId, reactions) {
            if (!teamData?.team?.premium_team) return '';
            const grouped = {};
            for (const r of (reactions || [])) {
                if (!grouped[r.emoji]) grouped[r.emoji] = { count: 0, mine: false };
                grouped[r.emoji].count++;
                if (r.user_id === currentUser.id) grouped[r.emoji].mine = true;
            }
            let html = '<div style="display:flex;gap:3px;margin-top:4px;flex-wrap:wrap">';
            for (const [emoji, data] of Object.entries(grouped)) {
                html += `<span onclick="reactToMsg('${msgId}','${emoji}')" style="cursor:pointer;font-size:0.75em;padding:1px 5px;border-radius:10px;background:${data.mine ? 'var(--accent)' : 'var(--bg-input)'};border:1px solid var(--border)">${emoji} ${data.count}</span>`;
            }
            html += `<span onclick="showEmojiPicker('${msgId}')" style="cursor:pointer;font-size:0.75em;padding:1px 5px;border-radius:10px;background:var(--bg-input);border:1px solid var(--border)">+</span>`;
            html += '</div>';
            return html;
        }

        function showEmojiPicker(msgId) {
            const existing = document.getElementById('emojiPicker');
            if (existing) existing.remove();
            const el = document.createElement('div');
            el.id = 'emojiPicker';
            el.style.cssText = 'position:fixed;bottom:80px;right:20px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:8px;display:flex;flex-wrap:wrap;gap:4px;max-width:200px;z-index:200';
            el.innerHTML = commonEmoji.map(e => `<span onclick="reactToMsg('${msgId}','${e}');document.getElementById('emojiPicker').remove()" style="cursor:pointer;font-size:1.2em;padding:4px">${e}</span>`).join('');
            el.innerHTML += `<span onclick="this.parentElement.remove()" style="cursor:pointer;font-size:0.8em;padding:4px;color:var(--text-dim)">Close</span>`;
            document.body.appendChild(el);
        }

        const reactToMsg = guard('reactToMsg', async function(msgId, emoji) {
            await api('POST', `/api/teams/${currentTeamId}/chat/${msgId}/react`, { emoji });
            await fetchChatMessages(true);
        });

        // --- Premium: Analytics Tab ---

        async function loadAndRenderAnalytics() {
            teamTab = 'analytics';
            renderTeamView();
            const el = document.getElementById('analyticsContent');
            if (!el) return;

            const [actData, warData, dkpData, attData] = await Promise.all([
                api('GET', `/api/teams/${currentTeamId}/analytics?type=activity`),
                api('GET', `/api/teams/${currentTeamId}/analytics?type=wars`),
                api('GET', `/api/teams/${currentTeamId}/analytics?type=dkp`),
                api('GET', `/api/teams/${currentTeamId}/analytics?type=attendance`),
            ]);

            let html = '';

            // Activity overview
            html += '<div class="card"><h3>Member Activity</h3>';
            const activity = actData.data || [];
            if (activity.length === 0) {
                html += '<div class="empty-state">No activity data</div>';
            } else {
                const now = Math.floor(Date.now() / 1000);
                const online = activity.filter(a => a.last_seen && now - a.last_seen < 300).length;
                const today = activity.filter(a => a.last_seen && now - a.last_seen < 86400).length;
                const week = activity.filter(a => a.last_seen && now - a.last_seen < 604800).length;
                html += `<div style="display:flex;gap:12px;margin-top:8px">
                    <div class="stat-box"><div class="stat-number" style="color:#34d399">${online}</div><div class="stat-label">Online Now</div></div>
                    <div class="stat-box"><div class="stat-number" style="color:var(--accent2)">${today}</div><div class="stat-label">Active Today</div></div>
                    <div class="stat-box"><div class="stat-number" style="color:var(--accent)">${week}</div><div class="stat-label">Active This Week</div></div>
                </div>`;
            }
            html += '</div>';

            // War trends
            html += '<div class="card"><h3>War Trends</h3>';
            const wars = warData.data || [];
            if (wars.length === 0) {
                html += '<div class="empty-state">No war data</div>';
            } else {
                // Group by month
                const byMonth = {};
                for (const w of wars) {
                    const d = new Date(w.war_date * 1000);
                    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
                    if (!byMonth[key]) byMonth[key] = { wins: 0, losses: 0, draws: 0 };
                    if (w.result === 'win') byMonth[key].wins++;
                    else if (w.result === 'loss') byMonth[key].losses++;
                    else byMonth[key].draws++;
                }
                for (const [month, s] of Object.entries(byMonth)) {
                    const total = s.wins + s.losses + s.draws;
                    const wr = total > 0 ? Math.round(s.wins / total * 100) : 0;
                    const barW = Math.max(5, wr);
                    html += `<div style="display:flex;align-items:center;gap:8px;margin-top:6px;font-size:0.85em">
                        <span style="width:70px;color:var(--text-muted)">${month}</span>
                        <div style="flex:1;background:var(--bg-input);border-radius:4px;height:20px;overflow:hidden">
                            <div style="width:${barW}%;background:linear-gradient(90deg,#34d399,#059669);height:100%;border-radius:4px;transition:width 0.3s"></div>
                        </div>
                        <span style="width:80px;text-align:right"><span style="color:#34d399">${s.wins}W</span>/<span style="color:#ef4444">${s.losses}L</span> ${wr}%</span>
                    </div>`;
                }
            }
            html += '</div>';

            // DKP progression
            html += '<div class="card"><h3>' + ptsName() + ' Top Earners</h3>';
            const dkp = dkpData.data || [];
            if (dkp.length === 0) {
                html += '<div class="empty-state">No ' + ptsName() + ' data</div>';
            } else {
                const balances = {};
                for (const d of dkp) {
                    if (!balances[d.username]) balances[d.username] = 0;
                    balances[d.username] += d.amount;
                }
                const sorted = Object.entries(balances).sort((a, b) => b[1] - a[1]).slice(0, 10);
                const maxBal = Math.max(...sorted.map(s => Math.abs(s[1])), 1);
                for (const [name, bal] of sorted) {
                    const barW = Math.max(5, Math.abs(bal) / maxBal * 100);
                    html += `<div style="display:flex;align-items:center;gap:8px;margin-top:4px;font-size:0.85em">
                        <span style="width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</span>
                        <div style="flex:1;background:var(--bg-input);border-radius:4px;height:16px;overflow:hidden">
                            <div style="width:${barW}%;background:${bal >= 0 ? '#34d399' : '#ef4444'};height:100%;border-radius:4px"></div>
                        </div>
                        <span style="width:60px;text-align:right;color:${bal >= 0 ? '#34d399' : '#ef4444'}">${bal}</span>
                    </div>`;
                }
            }
            html += '</div>';

            // Attendance rates
            html += '<div class="card"><h3>Attendance Rates</h3>';
            const att = attData.data || [];
            if (att.length === 0) {
                html += '<div class="empty-state">No attendance data</div>';
            } else {
                for (const a of att) {
                    const rate = a.total > 0 ? Math.round(a.attended / a.total * 100) : 0;
                    const barW = Math.max(5, rate);
                    html += `<div style="display:flex;align-items:center;gap:8px;margin-top:4px;font-size:0.85em">
                        <span style="width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.username}</span>
                        <div style="flex:1;background:var(--bg-input);border-radius:4px;height:16px;overflow:hidden">
                            <div style="width:${barW}%;background:var(--accent);height:100%;border-radius:4px"></div>
                        </div>
                        <span style="width:70px;text-align:right;color:var(--text-muted)">${a.attended}/${a.total} (${rate}%)</span>
                    </div>`;
                }
            }
            html += '</div>';

            // CSV Export
            html += `<div class="card"><h3>Export Data (CSV)</h3>
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
                    <button class="btn btn-secondary btn-sm" onclick="exportCSV('members')">Members</button>
                    <button class="btn btn-secondary btn-sm" onclick="exportCSV('dkp')">${ptsName()}</button>
                    <button class="btn btn-secondary btn-sm" onclick="exportCSV('wars')">Wars</button>
                    <button class="btn btn-secondary btn-sm" onclick="exportCSV('loot')">Loot</button>
                </div>
            </div>`;

            el.innerHTML = html;
        }

        const exportCSV = guard('exportCSV', async function(type) {
            const resp = await fetch(`${API}/api/teams/${currentTeamId}/export?type=${type}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const csv = await resp.text();
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${type}-export.csv`; a.click();
            URL.revokeObjectURL(url);
            showToast(`${type} exported!`);
        });

        // --- Announcements ---

        let teamAnnouncements = [];

        async function loadAndRenderAnnouncements() {
            teamTab = 'announcements';
            renderTeamView();
            const data = await api('GET', `/api/teams/${currentTeamId}/announcements`);
            teamAnnouncements = data.announcements || [];
            const el = document.getElementById('announcementsContent');
            if (el) el.innerHTML = renderAnnouncementsContent();
        }

        function renderAnnouncementsContent() {
            const team = teamData.team;
            const canManage = team.my_role === 'leader' || team.my_role === 'officer';
            let html = '';

            if (canManage) {
                html += `
                    <div class="card">
                        <div class="collapsible-header" onclick="toggleSection('addAnnouncementForm', this)">
                            <h3>+ Post Announcement</h3>
                            <span class="toggle-arrow">&#9660;</span>
                        </div>
                        <div class="collapsible-body" id="addAnnouncementForm">
                            <div class="form-group" style="margin-top:12px">
                                <label>Title</label>
                                <input type="text" id="announcementTitle" placeholder="e.g. Weekly Raid Schedule">
                            </div>
                            <div class="form-group">
                                <label>Body (optional)</label>
                                <textarea id="announcementBody" rows="3" placeholder="Details..." style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px;width:100%;resize:vertical;font-family:inherit"></textarea>
                            </div>
                            <div style="display:flex;gap:10px;align-items:center">
                                <label style="font-size:0.85em;color:#94a3b8"><input type="checkbox" id="announcementPinned" style="accent-color:#f59e0b"> Pin</label>
                                <button class="btn btn-primary" onclick="addAnnouncement()">Post</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            html += '<div id="announcementsListArea">' + renderAnnouncementsListOnly() + '</div>';
            return html;
        }

        function renderAnnouncementsListOnly() {
            const canManage = teamData.team.my_role === 'leader' || teamData.team.my_role === 'officer';
            if (teamAnnouncements.length === 0) {
                return '<div class="empty-state">No announcements yet</div>';
            }
            let html = '';
            for (const a of teamAnnouncements) {
                const date = new Date(a.created_at * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                html += `
                    <div class="announcement-card ${a.pinned ? 'pinned' : ''}">
                        <div class="announcement-header">
                            <div>
                                ${a.pinned ? '<span class="pin-icon">&#128204;</span>' : ''}
                                <span class="announcement-title">${escapeHtml(a.title)}</span>
                            </div>
                            <div style="display:flex;gap:4px;">
                                ${canManage ? `<button class="btn btn-sm btn-secondary" onclick="togglePin('${a.id}')" style="font-size:0.7em;padding:2px 8px">${a.pinned ? 'Unpin' : 'Pin'}</button>` : ''}
                                ${canManage || a.created_by === currentUser?.id ? `<button class="btn btn-danger btn-sm" onclick="deleteAnnouncement('${a.id}')" style="font-size:0.7em;padding:2px 8px">X</button>` : ''}
                            </div>
                        </div>
                        ${a.body ? `<div class="announcement-body">${escapeHtml(a.body)}</div>` : ''}
                        <div class="announcement-meta">by ${a.author_name} &middot; ${date}</div>
                    </div>
                `;
            }
            return html;
        }

        const addAnnouncement = guard('addAnnouncement', async function() {
            const title = document.getElementById('announcementTitle').value.trim();
            if (!title) return showToast('Title required');
            const body = document.getElementById('announcementBody').value.trim();
            const pinned = document.getElementById('announcementPinned').checked;
            const data = await api('POST', `/api/teams/${currentTeamId}/announcements`, { title, body: body || null, pinned });
            if (data.error) { showToast(data.error); return; }
            showToast('Announcement posted!');
            loadAndRenderAnnouncements();
        });

        const deleteAnnouncement = guard('deleteAnnouncement', async function(id) {
            if (!confirm('Delete this announcement?')) return;
            await api('DELETE', `/api/teams/${currentTeamId}/announcements/${id}`);
            loadAndRenderAnnouncements();
        });

        const togglePin = guard('togglePin', async function(id) {
            await api('POST', `/api/teams/${currentTeamId}/announcements/${id}/pin`);
            loadAndRenderAnnouncements();
        });

        // --- Wars & Stats ---

        async function loadAndRenderWars() {
            teamTab = 'wars';
            renderTeamView();
            const data = await api('GET', `/api/teams/${currentTeamId}/wars`);
            const el = document.getElementById('warsContent');
            if (el) el.innerHTML = renderWarsContent(data.wars || [], data.stats || {});
        }

        function renderWarsContent(wars, stats) {
            const team = teamData.team;
            const canManage = team.my_role === 'leader' || team.my_role === 'officer';
            const total = stats.wins + stats.losses + stats.draws;
            const winRate = total > 0 ? Math.round((stats.wins / total) * 100) : 0;
            let html = '';

            // Stats overview
            html += `
                <div style="display:flex;gap:8px;margin-bottom:16px">
                    <div class="stat-box">
                        <div class="stat-number" style="color:#34d399">${stats.wins || 0}</div>
                        <div class="stat-label">Wins</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" style="color:#ef4444">${stats.losses || 0}</div>
                        <div class="stat-label">Losses</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" style="color:#f59e0b">${stats.draws || 0}</div>
                        <div class="stat-label">Draws</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" style="color:#a78bfa">${winRate}%</div>
                        <div class="stat-label">Win Rate</div>
                    </div>
                </div>
            `;

            // Rival breakdown
            if (stats.byOpponent && Object.keys(stats.byOpponent).length > 0) {
                html += '<div class="card"><h3>Rivals</h3>';
                const rivals = Object.entries(stats.byOpponent).sort((a, b) => (b[1].wins + b[1].losses + b[1].draws) - (a[1].wins + a[1].losses + a[1].draws));
                for (const [opp, s] of rivals) {
                    html += `
                        <div class="dkp-row">
                            <span style="font-weight:600">${opp}</span>
                            <span style="font-size:0.85em">
                                <span style="color:#34d399">${s.wins}W</span> /
                                <span style="color:#ef4444">${s.losses}L</span> /
                                <span style="color:#f59e0b">${s.draws}D</span>
                            </span>
                        </div>
                    `;
                }
                html += '</div>';
            }

            // Log form
            if (canManage) {
                html += `
                    <div class="card">
                        <div class="collapsible-header" onclick="toggleSection('addWarForm', this)">
                            <h3>+ Log War Result</h3>
                            <span class="toggle-arrow">&#9660;</span>
                        </div>
                        <div class="collapsible-body" id="addWarForm">
                            <div class="form-row" style="margin-top:12px">
                                <div class="form-group">
                                    <label>Opponent</label>
                                    <input type="text" id="warOpponent" placeholder="e.g. Shadow Legion">
                                </div>
                                <div class="form-group" style="max-width:120px">
                                    <label>Result</label>
                                    <select id="warResult" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px">
                                        <option value="win">Win</option>
                                        <option value="loss">Loss</option>
                                        <option value="draw">Draw</option>
                                    </select>
                                </div>
                                <div class="form-group" style="max-width:120px">
                                    <label>Type</label>
                                    <select id="warType" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px">
                                        <option value="gvg">GvG</option>
                                        <option value="scrim">Scrim</option>
                                        <option value="raid">Raid</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row" style="margin-top:8px">
                                <div class="form-group" style="max-width:80px">
                                    <label>Our Score</label>
                                    <input type="number" id="warScoreUs" min="0">
                                </div>
                                <div class="form-group" style="max-width:80px">
                                    <label>Their Score</label>
                                    <input type="number" id="warScoreThem" min="0">
                                </div>
                                <div class="form-group">
                                    <label>Notes (optional)</label>
                                    <input type="text" id="warNotes" placeholder="e.g. Close fight, MVP: player">
                                </div>
                            </div>
                            <div style="margin-top:10px">
                                <button class="btn btn-primary" onclick="addWar()">Log Result</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            // War history
            html += '<div class="card"><h3>War History</h3>';
            if (wars.length === 0) {
                html += '<div class="empty-state">No wars logged yet</div>';
            } else {
                for (const w of wars) {
                    const date = new Date(w.war_date * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    const score = w.score_us !== null && w.score_them !== null ? `${w.score_us}-${w.score_them}` : '';
                    html += `
                        <div class="war-item ${w.result}">
                            <div>
                                <span style="font-weight:600">vs ${w.opponent}</span>
                                ${score ? `<span style="font-size:0.85em;color:#94a3b8"> (${score})</span>` : ''}
                                <span class="event-type-badge ${w.event_type}" style="margin-left:4px">${w.event_type}</span>
                                ${w.notes ? `<div style="font-size:0.8em;color:#64748b;margin-top:2px">${escapeHtml(w.notes)}</div>` : ''}
                                <div style="font-size:0.7em;color:#64748b">${date} &middot; by ${w.logged_by_name}</div>
                            </div>
                            <div style="display:flex;align-items:center;gap:6px">
                                <span class="war-result ${w.result}">${w.result.toUpperCase()}</span>
                                ${canManage ? `<button class="btn btn-danger btn-sm" onclick="deleteWar('${w.id}')" style="font-size:0.7em;padding:2px 8px">X</button>` : ''}
                            </div>
                        </div>
                    `;
                }
            }
            html += '</div>';

            return html;
        }

        const addWar = guard('addWar', async function() {
            const opponent = document.getElementById('warOpponent').value.trim();
            const result = document.getElementById('warResult').value;
            if (!opponent) return showToast('Opponent required');

            const scoreUs = document.getElementById('warScoreUs').value;
            const scoreThem = document.getElementById('warScoreThem').value;

            const data = await api('POST', `/api/teams/${currentTeamId}/wars`, {
                opponent, result,
                eventType: document.getElementById('warType').value,
                scoreUs: scoreUs !== '' ? parseInt(scoreUs) : undefined,
                scoreThem: scoreThem !== '' ? parseInt(scoreThem) : undefined,
                notes: document.getElementById('warNotes').value.trim() || null,
            });
            if (data.error) { showToast(data.error); return; }
            showToast('War result logged!');
            loadAndRenderWars();
        });

        const deleteWar = guard('deleteWar', async function(id) {
            await api('DELETE', `/api/teams/${currentTeamId}/wars/${id}`);
            loadAndRenderWars();
        });

        // --- Loot Tracker ---

        async function loadAndRenderLoot() {
            teamTab = 'loot';
            renderTeamView();
            const data = await api('GET', `/api/teams/${currentTeamId}/loot`);
            const el = document.getElementById('lootContent');
            if (el) el.innerHTML = renderLootContent(data.loot || []) + '<div id="wishlistArea"></div>';
            // Load wishlist async (premium)
            if (teamData?.team?.premium_team) {
                const whtml = await renderWishlistSection();
                const wa = document.getElementById('wishlistArea');
                if (wa) wa.innerHTML = whtml;
            }
        }

        function renderLootContent(loot) {
            const team = teamData.team;
            const canManage = team.my_role === 'leader' || team.my_role === 'officer';
            const members = teamData.members || [];
            let html = '';

            if (canManage) {
                html += `
                    <div class="card">
                        <div class="collapsible-header" onclick="toggleSection('addLootForm', this)">
                            <h3>+ Log Loot Drop</h3>
                            <span class="toggle-arrow">&#9660;</span>
                        </div>
                        <div class="collapsible-body" id="addLootForm">
                            <div class="form-row" style="margin-top:12px">
                                <div class="form-group">
                                    <label>Item Name</label>
                                    <input type="text" id="lootItemName" placeholder="e.g. Dragon Sword">
                                </div>
                                <div class="form-group">
                                    <label>Boss Name</label>
                                    <input type="text" id="lootBossName" placeholder="e.g. Dragon Lord">
                                </div>
                            </div>
                            <div class="form-row" style="margin-top:8px">
                                <div class="form-group">
                                    <label>Received By</label>
                                    <select id="lootRecipient" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px">
                                        ${members.map(m => `<option value="${m.id}">${m.username}</option>`).join('')}
                                    </select>
                                </div>
                                <div class="form-group" style="max-width:100px">
                                    <label>${ptsName()} Cost</label>
                                    <input type="number" id="lootDkpCost" value="0" min="0">
                                </div>
                                <div style="align-self:flex-end"><button class="btn btn-primary" onclick="addLoot()">Log</button></div>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (loot.length === 0) {
                html += '<div class="empty-state">No loot logged yet</div>';
            } else {
                for (const l of loot) {
                    const date = new Date(l.created_at * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    html += `
                        <div class="loot-item">
                            <div>
                                <span class="loot-item-name">${escapeHtml(l.item_name)}</span>
                                <span style="color:#64748b;font-size:0.8em"> from ${escapeHtml(l.boss_name)}</span>
                                <div style="font-size:0.8em;color:#94a3b8">${l.recipient_name} ${l.dkp_cost ? `(-${l.dkp_cost} ${ptsName()})` : ''} &middot; ${date}</div>
                            </div>
                            ${canManage ? `<button class="btn btn-danger btn-sm" onclick="deleteLoot('${l.id}')" style="font-size:0.7em;padding:2px 8px">X</button>` : ''}
                        </div>
                    `;
                }
            }
            return html;
        }

        const addLoot = guard('addLoot', async function() {
            const itemName = document.getElementById('lootItemName').value.trim();
            const bossName = document.getElementById('lootBossName').value.trim();
            const recipientId = document.getElementById('lootRecipient').value;
            const dkpCost = parseInt(document.getElementById('lootDkpCost').value) || 0;
            if (!itemName) return showToast('Item name required');
            const data = await api('POST', `/api/teams/${currentTeamId}/loot`, { itemName, bossName: bossName || 'Unknown', recipientId, dkpCost });
            if (data.error) { showToast(data.error); return; }
            showToast('Loot logged!');
            loadAndRenderLoot();
        });

        const deleteLoot = guard('deleteLoot', async function(id) {
            await api('DELETE', `/api/teams/${currentTeamId}/loot/${id}`);
            loadAndRenderLoot();
        });

        // --- DKP Points ---

        let dkpShowHistory = false;

        async function loadAndRenderDKP() {
            teamTab = 'dkp';
            renderTeamView();
            const [balData, histData] = await Promise.all([
                api('GET', `/api/teams/${currentTeamId}/dkp`),
                api('GET', `/api/teams/${currentTeamId}/dkp/history`),
            ]);
            const el = document.getElementById('dkpContent');
            if (el) el.innerHTML = renderDKPContent(balData.balances || [], histData.history || []) + '<div id="auctionsArea"></div>';
            // Load auctions async (premium)
            if (teamData?.team?.premium_team) {
                const ahtml = await renderAuctionsSection();
                const aa = document.getElementById('auctionsArea');
                if (aa) aa.innerHTML = ahtml;
            }
        }

        function renderDKPContent(balances, history) {
            const team = teamData.team;
            const canManage = team.my_role === 'leader' || team.my_role === 'officer';
            const members = teamData.members || [];
            let html = '';

            if (canManage) {
                html += `
                    <div class="card">
                        <div class="collapsible-header" onclick="toggleSection('addDkpForm', this)">
                            <h3>+ Award / Deduct ${ptsName()}</h3>
                            <span class="toggle-arrow">&#9660;</span>
                        </div>
                        <div class="collapsible-body" id="addDkpForm">
                            <div class="form-row" style="margin-top:12px">
                                <div class="form-group">
                                    <label>Member</label>
                                    <select id="dkpMember" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px">
                                        <option value="__all__">All Members</option>
                                        ${members.map(m => `<option value="${m.id}">${m.username}</option>`).join('')}
                                    </select>
                                </div>
                                <div class="form-group" style="max-width:100px">
                                    <label>Amount</label>
                                    <input type="number" id="dkpAmount" placeholder="e.g. 10">
                                </div>
                            </div>
                            <div class="form-group" style="margin-top:8px">
                                <label>Reason</label>
                                <input type="text" id="dkpReason" placeholder="e.g. Raid attendance, boss kill">
                            </div>
                            <div style="margin-top:10px">
                                <button class="btn btn-primary" onclick="awardDKP()">Submit</button>
                                <span style="font-size:0.8em;color:#64748b;margin-left:8px">Use negative for deductions</span>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Leaderboard
            html += '<div class="card"><h3>' + ptsName() + ' Standings</h3>';
            if (balances.length === 0) {
                html += '<div class="empty-state">No ' + ptsName() + ' recorded yet</div>';
            } else {
                for (let i = 0; i < balances.length; i++) {
                    const b = balances[i];
                    const medal = i === 0 ? '&#129351; ' : i === 1 ? '&#129352; ' : i === 2 ? '&#129353; ' : '';
                    html += `
                        <div class="dkp-row">
                            <div>
                                <span>${medal}${b.username}</span>
                            </div>
                            <span class="${b.balance >= 0 ? 'dkp-positive' : 'dkp-negative'}">${b.balance >= 0 ? '+' : ''}${b.balance} ${ptsName()}</span>
                        </div>
                    `;
                }
            }
            html += '</div>';

            // History toggle
            html += `<div class="card"><h3 style="cursor:pointer" onclick="document.getElementById('dkpHistoryList').style.display=document.getElementById('dkpHistoryList').style.display==='none'?'block':'none'">History &#9660;</h3>`;
            html += '<div id="dkpHistoryList" style="display:none">';
            if (history.length === 0) {
                html += '<div class="empty-state">No history</div>';
            } else {
                for (const h of history) {
                    const date = new Date(h.created_at * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    html += `
                        <div class="dkp-row">
                            <div>
                                <span style="font-weight:600">${h.username}</span>
                                <span style="font-size:0.8em;color:#64748b"> &middot; ${h.reason} &middot; by ${h.created_by_name} &middot; ${date}</span>
                            </div>
                            <span class="${h.amount >= 0 ? 'dkp-positive' : 'dkp-negative'}">${h.amount >= 0 ? '+' : ''}${h.amount}</span>
                        </div>
                    `;
                }
            }
            html += '</div></div>';

            return html;
        }

        const awardDKP = guard('awardDKP', async function() {
            const memberId = document.getElementById('dkpMember').value;
            const amount = parseInt(document.getElementById('dkpAmount').value);
            const reason = document.getElementById('dkpReason').value.trim();
            if (!amount || !reason) return showToast('Amount and reason required');

            if (memberId === '__all__') {
                const userIds = teamData.members.map(m => m.id);
                const data = await api('POST', `/api/teams/${currentTeamId}/dkp/bulk`, { userIds, amount, reason });
                if (data.error) { showToast(data.error); return; }
                showToast(`${ptsName()} awarded to all members!`);
            } else {
                const data = await api('POST', `/api/teams/${currentTeamId}/dkp`, { userId: memberId, amount, reason });
                if (data.error) { showToast(data.error); return; }
                showToast(ptsName() + ' updated!');
            }
            loadAndRenderDKP();
        });

        // --- Premium: Boss History Modal ---

        const showBossHistory = guard('showBossHistory', async function() {
            const data = await api('GET', `/api/teams/${currentTeamId}/bosses/history`);
            let html = '<h2>Boss Kill History</h2>';
            const stats = data.stats || [];
            if (stats.length > 0) {
                html += '<h3 style="color:var(--text-muted);margin:12px 0 8px">Kill Stats</h3>';
                for (const s of stats) {
                    html += `<div class="dkp-row"><span>${s.boss_name}</span><span style="color:#34d399">${s.kill_count} kills</span></div>`;

            if (history.length > 0) {
                html += '<h3 style="color:var(--text-muted);margin:12px 0 8px">Recent Kills</h3>';
                for (const h of history.slice(0, 20)) {
                    const date = new Date(h.killed_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    html += `<div style="font-size:0.85em;padding:4px 0;border-bottom:1px solid var(--border)">${h.boss_name} <span style="color:var(--text-dim)">by ${h.killed_by_name || 'unknown'} &middot; ${date}</span></div>`;

                html += '<div class="empty-state">No kills logged yet</div>';

                    <div class="card" style="width:500px;max-width:90vw;margin:0;max-height:80vh;overflow-y:auto">${html}</div>
                </div>`;
        });

        const showBossTemplates = guard('showBossTemplates', async function() {
            const data = await api('GET', '/api/boss-templates');
            const templates = data.templates || [];
            let html = '<h2>Boss Templates</h2>';
            if (templates.length === 0) {
                html += '<div class="empty-state">No templates available</div>';
            } else {
                for (const t of templates) {
                    const bosses = JSON.parse(t.bosses);
                    html += `<div class="dkp-row"><div><span style="font-weight:600">${escapeHtml(t.name)}</span> <span style="color:var(--text-dim);font-size:0.8em">(${t.game} &middot; ${bosses.length} bosses)</span></div>

                }
            }
            html += `<div style="margin-top:12px;display:flex;gap:8px">
                <button class="btn btn-secondary btn-sm" onclick="saveBossesAsTemplate()">Save Current as Template</button>
                <button class="btn btn-secondary btn-sm" onclick="document.getElementById('deathModal').innerHTML=''">Close</button>
            </div>`;
            document.getElementById('deathModal').innerHTML = `
                <div style="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100" onclick="if(event.target===this)document.getElementById('deathModal').innerHTML=''">
                    <div class="card" style="width:500px;max-width:90vw;margin:0;max-height:80vh;overflow-y:auto">${html}</div>
                </div>`;
        });

        const importBossTemplate = guard('importBossTemplate', async function(templateId) {
            const data = await api('POST', `/api/teams/${currentTeamId}/bosses/import-template`, { templateId });
            if (data.error) { showToast(data.error); return; }
            showToast(`Imported ${data.count} bosses!`);
            document.getElementById('deathModal').innerHTML = '';
            await loadTeamBosses(currentTeamId);

        const saveBossesAsTemplate = guard('saveBossesAsTemplate', async function() {
            const name = prompt('Template name:');
            if (!name) return;
            const game = prompt('Game name:');
            if (!game) return;
            const bosses = teamBosses.map(b => ({ name: b.name, type: b.type, intervalMs: b.interval_ms, fixedTime: b.fixed_time, weeklyDay: b.weekly_day, weeklyTime: b.weekly_time, biweeklyDays: b.biweekly_days ? JSON.parse(b.biweekly_days) : null, alertMinutes: b.alert_minutes }));
            await api('POST', '/api/boss-templates', { name, game, bosses });
            showToast('Template saved!');

        // --- Availability ---

        const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

        async function loadAndRenderAvailability() {
            teamTab = 'availability';
            renderTeamView();
            const data = await api('GET', `/api/teams/${currentTeamId}/availability`);
            const slots = data.slots || [];
            const el = document.getElementById('availabilityContent');
            if (el) el.innerHTML = renderAvailabilityContent(slots);
        }

        function renderAvailabilityContent(slots) {
            // Group by user
            const byUser = {};
            for (const s of slots) {
                if (!byUser[s.user_id]) byUser[s.user_id] = { username: s.username, slots: [] };
                byUser[s.user_id].slots.push(s);
            }

            // My slots editor
            let html = `
                <div class="card">
                    <div class="collapsible-header" onclick="toggleSection('editAvailForm', this)">
                        <h3>+ Set My Availability</h3>
                        <span class="toggle-arrow">&#9660;</span>
                    </div>
                    <div class="collapsible-body" id="editAvailForm">
                        <div id="myAvailSlots"></div>
                        <button class="btn btn-sm btn-secondary" onclick="addAvailSlot()" style="margin-top:8px">+ Add Slot</button>
                        <button class="btn btn-primary btn-sm" onclick="saveAvailability()" style="margin-top:8px;margin-left:8px">Save</button>
                    </div>
                </div>
            `;

            // Team grid view
            html += '<div class="card"><h3>Team Availability</h3>';
            if (Object.keys(byUser).length === 0) {
                html += '<div class="empty-state">No availability set yet</div>';
            } else {
                html += '<div class="avail-grid">';
                html += '<div class="avail-header"></div>';
                for (let d = 0; d < 7; d++) html += `<div class="avail-header">${dayNames[d]}</div>`;

                for (const [userId, userData] of Object.entries(byUser)) {
                    html += `<div class="avail-header" style="text-align:left;padding-left:6px">${userData.username}</div>`;
                    for (let d = 0; d < 7; d++) {
                        const daySlots = userData.slots.filter(s => s.day === d);
                        html += '<div class="avail-cell">';
                        for (const s of daySlots) {
                            html += `<div class="avail-slot">${s.start_time}-${s.end_time}</div>`;
                        }
                        html += '</div>';
                    }
                }
                html += '</div>';
            }
            html += '</div>';

            return html;
        }

        function addAvailSlot() {
            const container = document.getElementById('myAvailSlots');
            const div = document.createElement('div');
            div.className = 'form-row';
            div.style.marginTop = '6px';
            div.innerHTML = `
                <div class="form-group" style="max-width:110px">
                    <select class="avail-day" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:8px;border-radius:8px">
