                    </select>
                </div>
                <div class="form-group" style="max-width:110px">
                    <input type="time" class="avail-start" style="color-scheme:var(--color-scheme)">
                </div>
                <div class="form-group" style="max-width:110px">
                    <input type="time" class="avail-end" style="color-scheme:var(--color-scheme)">
                </div>
                <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()" style="align-self:center">X</button>
            `;
            container.appendChild(div);
        }

        const saveAvailability = guard('saveAvailability', async function() {
            const rows = document.querySelectorAll('#myAvailSlots .form-row');
            const slots = [];
            for (const row of rows) {
                const day = parseInt(row.querySelector('.avail-day').value);
                const startTime = row.querySelector('.avail-start').value;
                const endTime = row.querySelector('.avail-end').value;
                if (startTime && endTime) slots.push({ day, startTime, endTime });
            }
            const data = await api('PUT', `/api/teams/${currentTeamId}/availability`, { slots });
            if (data.error) { showToast(data.error); return; }
            showToast('Availability saved!');
            loadAndRenderAvailability();
        });

        // --- Events ---

        let teamEvents = [];

        async function loadAndRenderEvents() {
            teamTab = 'events';
            renderTeamView();
            const data = await api('GET', `/api/teams/${currentTeamId}/events`);
            teamEvents = data.events || [];
            const el = document.getElementById('eventsContent');
            if (el) el.innerHTML = renderEventsContent();
        }

        function renderEventsContent() {
            const now = Date.now();
            const canManage = teamData.team.my_role === 'leader' || teamData.team.my_role === 'officer';

            let html = `
                <div class="card">
                    <div class="collapsible-header" onclick="toggleSection('addEventForm', this)">
                        <h3>+ Create Event</h3>
                        <span class="toggle-arrow">&#9660;</span>
                    </div>
                    <div class="collapsible-body" id="addEventForm">
                        <div class="form-row" style="margin-top:12px">
                            <div class="form-group">
                                <label>Title</label>
                                <input type="text" id="eventTitle" placeholder="e.g. Guild War">
                            </div>
                            <div class="form-group" style="max-width:140px">
                                <label>Type</label>
                                <select id="eventType" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px">
                                    <option value="scrim">Scrim</option>
                                    <option value="raid">Raid</option>
                                    <option value="gvg">GvG</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row" style="margin-top:8px">
                            <div class="form-group">
                                <label>Date & Time</label>
                                <input type="datetime-local" id="eventDateTime" style="color-scheme:var(--color-scheme)">
                            </div>
                            <div class="form-group" style="max-width:100px">
                                <label>Duration (min)</label>
                                <input type="number" id="eventDuration" value="60" min="15">
                            </div>
                            <div class="form-group" style="max-width:140px">
                                <label>Repeat</label>
                                <select id="eventRecurrence" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:10px;border-radius:8px">
                                    <option value="none">No repeat</option>
                                    <option value="daily">Daily</option>
                                    <option value="weekly">Weekly</option>
                                    <option value="biweekly">Biweekly</option>
                                    <option value="monthly">Monthly</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" style="margin-top:8px">
                            <label>Description (optional)</label>
                            <input type="text" id="eventDesc" placeholder="Details, links, etc.">
                        </div>
                        <div style="margin-top:10px">
                            <button class="btn btn-primary" onclick="addEvent()">Create Event</button>
                        </div>
                    </div>
                </div>
            `;

            html += '<div id="eventsListArea">' + renderEventsListOnly() + '</div>';
            return html;
        }

        function renderEventsListOnly() {
            const now = Date.now();
            const canManage = teamData.team.my_role === 'leader' || teamData.team.my_role === 'officer';
            let html = '';
            const upcoming = teamEvents.filter(e => e.event_time + (e.duration_minutes || 60) * 60000 > now);
            const past = teamEvents.filter(e => e.event_time + (e.duration_minutes || 60) * 60000 <= now);

            if (upcoming.length === 0 && past.length === 0) {
                html += '<div class="empty-state">No events yet</div>';
            }

            if (upcoming.length > 0) {
                html += '<h3 style="color:#94a3b8;margin:16px 0 10px">Upcoming</h3>';
                for (const e of upcoming) html += renderEventCard(e, canManage, false);
            }

            if (past.length > 0) {
                html += '<h3 style="color:#64748b;margin:16px 0 10px">Past</h3>';
                for (const e of past.slice(-10).reverse()) html += renderEventCard(e, canManage, true);
            }

            return html;
        }

        function renderEventCard(e, canManage, isPast) {
            const eventDate = new Date(e.event_time);
            const dateStr = eventDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            const timeStr = eventDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            const remaining = e.event_time - Date.now();
            const isStarting = remaining <= 0 && remaining > -(e.duration_minutes || 60) * 60000;

            let countdown = '';
            if (isStarting) countdown = '<span style="color:#ef4444;font-weight:600"> LIVE NOW</span>';
            else if (remaining > 0) countdown = ` (in ${formatTimeLong(remaining)})`;

            return `
                <div class="event-card ${isPast ? 'past' : ''}" data-event-id="${e.id}">
                    <div class="event-header">
                        <div>
                            <span class="event-title">${escapeHtml(e.title)}</span>
                            <span class="event-type-badge ${e.event_type}">${e.event_type}</span>
                            ${e.recurrence ? `<span class="event-type-badge" style="background:#1e3a5f;color:#60a5fa">${e.recurrence}</span>` : ''}
                        </div>
                        ${canManage || e.created_by === currentUser?.id ? `<button class="btn btn-danger btn-sm" onclick="deleteEvent('${e.id}')">X</button>` : ''}
                    </div>
                    <div class="event-time">${dateStr} at ${timeStr} (${e.duration_minutes || 60}min)<span class="event-countdown">${countdown}</span></div>
                    ${e.description ? `<div class="event-desc">${escapeHtml(e.description)}</div>` : ''}
                    <div class="event-time" style="margin-top:4px;font-size:0.75em">by ${e.creator_name}</div>
                    <div class="rsvp-bar">
                        <button class="rsvp-btn ${e.my_rsvp === 'going' ? 'active-going' : ''}" onclick="rsvpEvent('${e.id}','going')">Going</button>
                        <button class="rsvp-btn ${e.my_rsvp === 'maybe' ? 'active-maybe' : ''}" onclick="rsvpEvent('${e.id}','maybe')">Maybe</button>
                        <button class="rsvp-btn ${e.my_rsvp === 'not_going' ? 'active-not' : ''}" onclick="rsvpEvent('${e.id}','not_going')">Can't</button>
                        <span class="rsvp-counts">${e.going_count} going &middot; ${e.maybe_count} maybe &middot; ${e.not_going_count} can't</span>
                    </div>
                </div>
            `;
        }

        function formatTimeLong(ms) {
            const totalMin = Math.floor(ms / 60000);
            if (totalMin < 60) return totalMin + 'min';
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            if (h < 24) return h + 'h ' + (m > 0 ? m + 'm' : '');
            const d = Math.floor(h / 24);
            return d + 'd ' + (h % 24) + 'h';
        }

        const addEvent = guard('addEvent', async function() {
            const title = document.getElementById('eventTitle').value.trim();
            const dateTime = document.getElementById('eventDateTime').value;
            if (!title || !dateTime) return showToast('Title and date/time required');

            const eventTime = new Date(dateTime).getTime();
            if (isNaN(eventTime)) return;

            const recurrence = document.getElementById('eventRecurrence').value;
            const data = await api('POST', `/api/teams/${currentTeamId}/events`, {
                title,
                eventType: document.getElementById('eventType').value,
                eventTime,
                durationMinutes: parseInt(document.getElementById('eventDuration').value) || 60,
                description: document.getElementById('eventDesc').value.trim() || null,
                recurrence: recurrence !== 'none' ? recurrence : null,
            });

            if (data.error) { showToast(data.error); return; }
            showToast(`Event "${title}" created`);
            loadAndRenderEvents();
        });

        const rsvpEvent = guard('rsvpEvent', async function(eventId, status) {
            await api('POST', `/api/teams/${currentTeamId}/events/${eventId}/rsvp`, { status });
            loadAndRenderEvents();
        });

        const deleteEvent = guard('deleteEvent', async function(eventId) {
            if (!confirm('Delete this event?')) return;
            await api('DELETE', `/api/teams/${currentTeamId}/events/${eventId}`);
            showToast('Event deleted');
            loadAndRenderEvents();
        });

        function formatTime(ms) {
            if (ms <= 0) return '00:00';
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
            return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }

        // Tick — update countdown text only, don't re-render
        setInterval(() => {
            if (!currentTeamId || teamTab !== 'timers') return;
            for (const boss of teamBosses) {
                const el = document.querySelector(`[data-boss-id="${boss.id}"] .boss-countdown`);
                if (!el) continue;
                const remaining = boss.next_spawn - Date.now();
                const isSpawned = remaining <= 0 || boss.status === 'spawned';
                if (isSpawned) {
                    el.textContent = 'SPAWNED';
                    el.className = 'boss-countdown spawned';
                } else {
                    el.textContent = formatTime(remaining);
                    const alertMs = boss.alert_minutes * 60000;
                    el.className = remaining <= alertMs ? 'boss-countdown warning-text' : 'boss-countdown active';
                }
            }
        }, 1000);

        // Refresh boss data from server every 15 seconds
        setInterval(async () => {
            if (!currentTeamId || teamTab !== 'timers') return;
            await loadTeamBosses(currentTeamId);
            // Only update boss list area, not the add form
            const bossList = document.getElementById('bossListArea');
            if (bossList) {
                const team = teamData.team;
                const canManage = team.my_role === 'leader' || team.my_role === 'officer';
                bossList.innerHTML = renderBossListOnly(canManage);
            }

        // Tick — update event countdowns every second
        setInterval(() => {
            if (!currentTeamId || teamTab !== 'events') return;
            for (const e of teamEvents) {
                const el = document.querySelector(`[data-event-id="${e.id}"] .event-countdown`);
                if (!el) continue;
                const remaining = e.event_time - Date.now();
                const isLive = remaining <= 0 && remaining > -(e.duration_minutes || 60) * 60000;
                if (isLive) {
                    el.innerHTML = '<span style="color:#ef4444;font-weight:600"> LIVE NOW</span>';
                } else if (remaining > 0) {
                    el.textContent = ` (in ${formatTimeLong(remaining)})`;
                } else {
                    el.textContent = '';
                }
            }
        }, 1000);

        // Refresh event data from server every 30 seconds
        setInterval(async () => {
            if (!currentTeamId || teamTab !== 'events') return;
            const data = await api('GET', `/api/teams/${currentTeamId}/events`);
            teamEvents = data.events || [];
            const el = document.getElementById('eventsListArea');
            if (el) el.innerHTML = renderEventsListOnly();
        }, 30000);

        // Refresh chat every 5 seconds
        setInterval(async () => {

        }, 5000);

        }, 300000);


        // --- Actions ---

        // --- Polls & Voting ---

        async function loadAndRenderPolls() {

        function renderPollsContent(polls) {
            const team = teamData.team;
            const canManage = team.my_role === 'leader' || team.my_role === 'officer';
            let html = '';

            // Create poll form (any member can create)
            html += `
                <div class="card">
                    <div class="collapsible-header" onclick="toggleSection('addPollForm', this)">
                        <h3>+ Create Poll</h3>
                        <span class="toggle-arrow">&#9660;</span>

                    <div class="collapsible-body" id="addPollForm">
                        <div class="form-group" style="margin-top:12px">

                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Type</label>
                                <select id="pollType" style="background:var(--bg-input);border:1px solid var(--border-input);color:var(--text);padding:10px;border-radius:8px">
                                    <option value="single">Single Choice</option>
                                    <option value="multi">Multiple Choice</option>
                                </select>
                            </div>
                        </div>
                        <div id="pollOptionsContainer">
                            <label>Options</label>
                            <div class="form-group"><input type="text" class="poll-option-input" placeholder="Option 1" maxlength="100"></div>
                            <div class="form-group"><input type="text" class="poll-option-input" placeholder="Option 2" maxlength="100"></div>
                        </div>
                        <button class="btn btn-secondary btn-sm" onclick="addPollOptionField()" style="margin:8px 0">+ Add Option</button>
                        <div><button class="btn btn-primary" onclick="createPoll()">Create Poll</button></div>
                    </div>
                </div>
            `;

            // Polls list
            if (polls.length === 0) {
                html += '<div class="card"><div class="empty-state">No polls yet — create one above!</div></div>';
            }
            for (const poll of polls) {
                const totalVotes = poll.options.reduce((sum, o) => sum + o.votes.length, 0);
                const isExpired = poll.expires_at && poll.expires_at < Math.floor(Date.now() / 1000);
                const isClosed = poll.closed || isExpired;
                const hasVoted = poll.myVotes.length > 0;

                html += `<div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start">
                        <div>
                            <h3>${escapeHtml(poll.question)}</h3>
                            <div style="font-size:0.75em;color:var(--text-dim);margin-top:2px">
                                by ${escapeHtml(poll.created_by_name)} &middot; ${poll.poll_type === 'multi' ? 'Multi-choice' : 'Single choice'}
                                &middot; ${totalVotes} vote${totalVotes !== 1 ? 's' : ''}
                                ${isClosed ? ' &middot; <span style="color:#ef4444">Closed</span>' : ''}
                            </div>
                        </div>
                        <div style="display:flex;gap:4px">
                            ${!isClosed && canManage ? `<button class="btn btn-secondary btn-sm" onclick="closePoll('${poll.id}')">Close</button>` : ''}
                            ${canManage ? `<button class="btn btn-danger btn-sm" onclick="deletePoll('${poll.id}')">X</button>` : ''}
                        </div>
                    </div>
                    <div style="margin-top:12px">`;

                for (const opt of poll.options) {
                    const pct = totalVotes > 0 ? Math.round((opt.votes.length / totalVotes) * 100) : 0;
                    const isMyVote = poll.myVotes.includes(opt.id);
                    const voters = opt.votes.map(v => escapeHtml(v.username)).join(', ');

                    html += `<div style="margin-bottom:8px">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
                            <span style="font-size:0.9em;${isMyVote ? 'font-weight:700;color:var(--accent)' : ''}">${escapeHtml(opt.label)}</span>
                            <span style="font-size:0.8em;color:var(--text-muted)">${opt.votes.length} (${pct}%)</span>
                        </div>
                        <div style="background:var(--bg-input);border-radius:6px;height:24px;overflow:hidden;position:relative;cursor:${isClosed ? 'default' : 'pointer'}"
                            ${!isClosed ? `onclick="votePoll('${poll.id}','${opt.id}','${poll.poll_type}')"` : ''}
                            title="${voters || 'No votes'}">
                            <div style="background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;width:${pct}%;border-radius:6px;transition:width 0.3s"></div>
                        </div>
                    </div>`;
                }
                html += '</div></div>';
            }

            return html;
        }

        function addPollOptionField() {
            const container = document.getElementById('pollOptionsContainer');

            if (count >= 10) return showToast('Max 10 options');

            if (!question) return showToast('Question required');

            const options = [...inputs].map(i => i.value.trim()).filter(Boolean);
            if (options.length < 2) return showToast('At least 2 options required');

            const data = await api('POST', `/api/teams/${currentTeamId}/polls`, {
                question,
                pollType: document.getElementById('pollType').value,
                options,

            showToast('Poll created!');
            loadAndRenderPolls();
        });

            const data = await api('POST', `/api/teams/${currentTeamId}/polls/${pollId}/vote`, {
                optionIds: [optionId],
            });
            if (data.error) { showToast(data.error); return; }
            loadAndRenderPolls();

        const closePoll = guard('closePoll', async function(pollId) {
            await api('POST', `/api/teams/${currentTeamId}/polls/${pollId}/close`);

        // --- Roster / Lineup Builder ---

        function addRosterSlotField() {
            const container = document.getElementById('rosterSlotsContainer');
            const count = container.querySelectorAll('.roster-slot-row').length;
            if (count >= 30) return showToast('Max 30 slots');
            const members = teamData.members;
            const memberOpts = members.map(m => `<option value="${m.user_id}">${escapeHtml(m.username)}</option>`).join('');
            const div = document.createElement('div');
            div.className = 'roster-slot-row';
            div.style.cssText = 'display:flex;gap:8px;margin-bottom:6px';

                <input type="text" class="roster-role-input" placeholder="Role" maxlength="50" style="flex:1">

                </select>`;
            container.appendChild(div);

        const createRoster = guard('createRoster', async function() {
            const name = document.getElementById('rosterName').value.trim();
            if (!name) return showToast('Roster name required');

            const roles = document.querySelectorAll('.roster-role-input');
            const selects = document.querySelectorAll('.roster-member-select');
            const slots = [];
            roles.forEach((r, i) => {
                if (r.value.trim()) slots.push({ roleName: r.value.trim(), userId: selects[i]?.value || null });
            });

            const data = await api('POST', `/api/teams/${currentTeamId}/rosters`, { name, slots });
            if (data.error) { showToast(data.error); return; }
            showToast('Roster created!');
            loadAndRenderRosters();
        });

            const data = await api('GET', `/api/teams/${currentTeamId}/rosters`);
            const roster = (data.rosters || []).find(r => r.id === rosterId);
            if (!roster) return;

            for (const s of roster.slots) {

                    <select class="edit-roster-member" style="flex:1;background:var(--bg-input);border:1px solid var(--border-input);color:var(--text);padding:8px;border-radius:8px">

                    </select>

            }

                <div style="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100" onclick="if(event.target===this)document.getElementById('deathModal').innerHTML=''">
                    <div class="card" style="width:500px;max-width:90vw;margin:0;max-height:80vh;overflow-y:auto">
                        <h2>Edit Roster: ${escapeHtml(roster.name)}</h2>
                        <div id="editRosterSlots">${slotsHtml}</div>

                        <div style="display:flex;gap:8px;margin-top:8px">
                            <button class="btn btn-primary" onclick="saveRosterSlots('${rosterId}')">Save</button>

                    </div>
                </div>`;

            setTimeout(() => {
                const selects = document.querySelectorAll('.edit-roster-member');
                roster.slots.forEach((s, i) => { if (selects[i] && s.user_id) selects[i].value = s.user_id; });

            const container = document.getElementById('editRosterSlots');
            const members = teamData.members;
            const memberOpts = members.map(m => `<option value="${m.user_id}">${escapeHtml(m.username)}</option>`).join('');
            const div = document.createElement('div');
            div.style.cssText = 'display:flex;gap:8px;margin-bottom:6px';
            div.innerHTML = `
                <input type="text" class="edit-roster-role" placeholder="Role" style="flex:1" maxlength="50">
                <select class="edit-roster-member" style="flex:1;background:var(--bg-input);border:1px solid var(--border-input);color:var(--text);padding:8px;border-radius:8px">

        // --- Performance Tracker ---

        async function loadAndRenderPerformance() {
            teamTab = 'performance';
            renderTeamView();
            const data = await api('GET', `/api/teams/${currentTeamId}/performance`);
            const el = document.getElementById('performanceContent');
            if (el) el.innerHTML = renderPerformanceContent(data.entries || [], data.memberStats || {});

        function renderPerformanceContent(entries, memberStats) {
            const team = teamData.team;
            const members = teamData.members;
            const canManage = team.my_role === 'leader' || team.my_role === 'officer';
            let html = '';

            // Member averages overview
            const statKeys = new Set();
            for (const uid in memberStats) {
                for (const s in memberStats[uid].stats) statKeys.add(s);
            }

            if (Object.keys(memberStats).length > 0 && statKeys.size > 0) {
                html += '<div class="card"><h3>Member Averages</h3><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.85em">';
                html += '<tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:6px">Player</th>';
                for (const key of statKeys) html += `<th style="text-align:right;padding:6px">${escapeHtml(key)}</th>`;
                html += '</tr>';

                for (const uid in memberStats) {
                    const m = memberStats[uid];
                    html += `<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px;font-weight:600">${escapeHtml(m.username)}</td>`;
                    for (const key of statKeys) {
                        const s = m.stats[key];
                        const avg = s ? (s.total / s.count).toFixed(1) : '—';
                        html += `<td style="text-align:right;padding:6px">${avg}</td>`;
                    }
                    html += '</tr>';
                }
                html += '</table></div></div>';
            }

            // Log form
            if (canManage) {
                const memberOpts = members.map(m => `<option value="${m.user_id}">${escapeHtml(m.username)}</option>`).join('');
                html += `
                    <div class="card">
                        <div class="collapsible-header" onclick="toggleSection('addPerfForm', this)">
                            <h3>+ Log Stats</h3>
                            <span class="toggle-arrow">&#9660;</span>
                        </div>
                        <div class="collapsible-body" id="addPerfForm">
                            <div class="form-row" style="margin-top:12px">
                                <div class="form-group">
                                    <label>Player</label>
                                    <select id="perfMember" style="background:var(--bg-input);border:1px solid var(--border-input);color:var(--text);padding:10px;border-radius:8px">
                                        ${memberOpts}
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Event / Match</label>
                                    <input type="text" id="perfEventLabel" placeholder="e.g. GvG vs Shadow Legion" maxlength="100">
                                </div>
                            </div>
                            <div id="perfStatsContainer">
                                <label>Stats</label>
                                <div class="perf-stat-row" style="display:flex;gap:8px;margin-bottom:6px">
                                    <input type="text" class="perf-stat-name" placeholder="Stat name (e.g. Kills)" style="flex:1" maxlength="50">
                                    <input type="number" class="perf-stat-value" placeholder="Value" style="flex:1">
                                </div>
                            </div>
                            <button class="btn btn-secondary btn-sm" onclick="addPerfStatField()" style="margin:8px 0">+ Add Stat</button>
                            <div><button class="btn btn-primary" onclick="logPerformance()">Log Stats</button></div>
                        </div>
                    </div>
                `;
            }

            // Recent entries
            html += '<div class="card"><h3>Recent Entries</h3>';
            if (entries.length === 0) {
                html += '<div class="empty-state">No stats logged yet</div>';
            } else {
                let lastLabel = '';
                for (const e of entries) {
                    const label = `${e.player_name} — ${e.event_label}`;
                    if (label !== lastLabel) {
                        if (lastLabel) html += '</div>';
                        const date = new Date(e.created_at * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        html += `<div style="margin-top:10px;padding:8px;background:var(--bg-item);border-radius:8px">
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <span style="font-weight:600;font-size:0.9em">${escapeHtml(e.player_name)} — ${escapeHtml(e.event_label)}</span>
                                <span style="font-size:0.7em;color:var(--text-dim)">${date}</span>
                            </div>`;
                        lastLabel = label;
                    }
                    html += `<div class="dkp-row" style="padding:2px 0">
                        <span style="color:var(--text-muted);font-size:0.85em">${escapeHtml(e.stat_name)}</span>
                        <span style="font-weight:600">${e.stat_value}</span>
                    </div>`;
                }
                if (lastLabel) html += '</div>';
            }
            html += '</div>';
            return html;
        }

        function addPerfStatField() {
            const container = document.getElementById('perfStatsContainer');
            const count = container.querySelectorAll('.perf-stat-row').length;
            if (count >= 20) return showToast('Max 20 stats');
            const div = document.createElement('div');
            div.className = 'perf-stat-row';
            div.style.cssText = 'display:flex;gap:8px;margin-bottom:6px';
            div.innerHTML = `
                <input type="text" class="perf-stat-name" placeholder="Stat name" style="flex:1" maxlength="50">

        const logPerformance = guard('logPerformance', async function() {
            const userId = document.getElementById('perfMember').value;
            const eventLabel = document.getElementById('perfEventLabel').value.trim();
            if (!eventLabel) return showToast('Event/match label required');

            const names = document.querySelectorAll('.perf-stat-name');
            const values = document.querySelectorAll('.perf-stat-value');
            const stats = [];
            names.forEach((n, i) => {
                if (n.value.trim() && values[i]?.value !== '') stats.push({ name: n.value.trim(), value: Number(values[i].value) });
            });
            if (stats.length === 0) return showToast('At least 1 stat required');

            const data = await api('POST', `/api/teams/${currentTeamId}/performance`, { userId, eventLabel, stats });
            if (data.error) { showToast(data.error); return; }
            showToast('Stats logged!');
            loadAndRenderPerformance();
        });

                        <div>
                            <h3>${escapeHtml(post.title)} ${isOpen ? '<span style="color:#34d399;font-size:0.7em">OPEN</span>' : '<span style="color:#ef4444;font-size:0.7em">CLOSED</span>'}</h3>
                            ${post.role_needed ? `<div style="font-size:0.85em;color:var(--accent);margin-top:2px">Role: ${escapeHtml(post.role_needed)}</div>` : ''}
                            ${post.description ? `<div style="font-size:0.85em;color:var(--text-muted);margin-top:4px">${escapeHtml(post.description)}</div>` : ''}

                            ${canManage ? `<button class="btn btn-danger btn-sm" onclick="deleteRecruitPost('${post.id}')">X</button>` : ''}
                        </div>
                    </div>`;

                // Applications section
                if (canManage && post.applications) {
                    html += `<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:8px">
                        <div style="font-size:0.85em;font-weight:600;margin-bottom:6px">Applications (${post.applications.length})</div>`;
                    if (post.applications.length === 0) {
                        html += '<div style="font-size:0.8em;color:var(--text-dim)">No applications yet</div>';
                    }
                    for (const app of post.applications) {
                        const statusColor = app.status === 'accepted' ? '#34d399' : app.status === 'rejected' ? '#ef4444' : '#f59e0b';
                        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px;background:var(--bg-item);border-radius:6px;margin-bottom:4px">
                            <div>
                                <span style="font-weight:600;font-size:0.9em">${escapeHtml(app.applicant_name)}</span>
                                <span style="font-size:0.75em;color:${statusColor};margin-left:6px">${app.status.toUpperCase()}</span>
                                ${app.message ? `<div style="font-size:0.8em;color:var(--text-muted);margin-top:2px">${escapeHtml(app.message)}</div>` : ''}
                            </div>
                            ${app.status === 'pending' ? `<div style="display:flex;gap:4px">
                                <button class="btn btn-sm" style="background:#065f46;color:#34d399;padding:4px 10px" onclick="reviewApplication('${post.id}','${app.id}','accepted')">Accept</button>
                                <button class="btn btn-sm" style="background:#7f1d1d;color:#ef4444;padding:4px 10px" onclick="reviewApplication('${post.id}','${app.id}','rejected')">Reject</button>

                    if (post.myApplication) {

                        html += `<div style="margin-top:4px;font-size:0.85em">Your application: <span style="color:${sc};font-weight:600">${post.myApplication.status.toUpperCase()}</span></div>`;
                    } else if (isOpen) {

            if (!title) return showToast('Title required');

            loadAndRenderRecruitment();
        });

        const reopenRecruitPost = guard('reopenRecruitPost', async function(postId) {

            loadAndRenderRecruitment();

        const deleteRecruitPost = guard('deleteRecruitPost', async function(postId) {

        const applyToPost = guard('applyToPost', async function(postId) {

        // --- File Vault ---

        async function loadAndRenderFiles() {
            teamTab = 'files';
            renderTeamView();
            const data = await api('GET', `/api/teams/${currentTeamId}/files`);
            const el = document.getElementById('filesContent');
            if (el) el.innerHTML = renderFilesContent(data.files || [], data.totalBytes || 0);
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function getFileIcon(contentType, name) {
            if (contentType.startsWith('image/')) return '🖼️';
            if (contentType.startsWith('video/')) return '🎬';
            if (contentType.startsWith('audio/')) return '🎵';
            if (contentType.includes('pdf')) return '📄';
            if (contentType.includes('spreadsheet') || name.match(/\.(xlsx?|csv)$/i)) return '📊';
            if (contentType.includes('document') || name.match(/\.(docx?|txt)$/i)) return '📝';
            if (contentType.includes('zip') || name.match(/\.(zip|rar|7z)$/i)) return '📦';
            return '📎';
        }

        function renderFilesContent(files, totalBytes) {
            const team = teamData.team;
            const canManage = team.my_role === 'leader' || team.my_role === 'officer';
            const premium = team.premium_team;
            const storageLimit = premium ? 500 * 1024 * 1024 : 100 * 1024 * 1024;
            const usedPct = Math.round((totalBytes / storageLimit) * 100);
            let html = '';

            // Storage bar
            html += `<div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                    <h3>Storage</h3>
                    <span style="font-size:0.85em;color:var(--text-muted)">${formatFileSize(totalBytes)} / ${premium ? '500 MB' : '100 MB'}</span>
                </div>
                <div style="background:var(--bg-input);border-radius:6px;height:8px;overflow:hidden">
                    <div style="background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;width:${Math.min(usedPct, 100)}%;border-radius:6px;transition:width 0.3s"></div>
                </div>
            </div>`;

            // Upload form
            html += `<div class="card">
                <div class="collapsible-header" onclick="toggleSection('uploadFileForm', this)">
                    <h3>+ Upload File</h3>
                    <span class="toggle-arrow">&#9660;</span>
                </div>
                <div class="collapsible-body" id="uploadFileForm">
                    <div style="margin-top:12px">
                        <input type="file" id="fileInput" style="margin-bottom:8px">
                        <div style="font-size:0.8em;color:var(--text-dim);margin-bottom:8px">Max 5MB per file. Accepts images, documents, spreadsheets, etc.</div>
                        <button class="btn btn-primary" onclick="uploadFile()">Upload</button>
                        <div id="uploadProgress" style="display:none;margin-top:8px;font-size:0.85em;color:var(--accent)">Uploading...</div>
                    </div>
                </div>
            </div>`;

            // Files list
            html += '<div class="card"><h3>Files (' + files.length + ')</h3>';
            if (files.length === 0) {
                html += '<div class="empty-state">No files uploaded yet</div>';
            }
            for (const f of files) {
                const date = new Date(f.created_at * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const icon = getFileIcon(f.content_type, f.file_name);
                const isImage = f.content_type.startsWith('image/');

                html += `<div class="dkp-row" style="padding:10px 0;align-items:flex-start">
                    <div style="display:flex;gap:10px;align-items:center;flex:1;min-width:0">
                        <span style="font-size:1.4em">${icon}</span>
                        <div style="min-width:0;flex:1">
                            <div style="font-weight:600;font-size:0.9em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(f.file_name)}</div>
                            <div style="font-size:0.75em;color:var(--text-dim)">${formatFileSize(f.file_size)} &middot; ${escapeHtml(f.uploaded_by_name)} &middot; ${date}</div>
                        </div>
                    </div>
                    <div style="display:flex;gap:4px;flex-shrink:0">
                        ${isImage ? `<button class="btn btn-secondary btn-sm" onclick="previewFile('${f.id}','${escapeHtml(f.file_name)}','${f.content_type}')" style="font-size:0.75em">Preview</button>` : ''}
                        <button class="btn btn-secondary btn-sm" onclick="downloadFile('${f.id}')" style="font-size:0.75em">Download</button>
                        ${canManage ? `<button class="btn btn-danger btn-sm" onclick="deleteFile('${f.id}')" style="font-size:0.75em">X</button>` : ''}
                    </div>
                </div>`;
            }
            html += '</div>';
            return html;
        }

        const uploadFile = guard('uploadFile', async function() {
            const input = document.getElementById('fileInput');
            if (!input.files || !input.files[0]) return showToast('Select a file first');
            const file = input.files[0];
            if (file.size > 5 * 1024 * 1024) return showToast('File too large (max 5MB)');

            const progress = document.getElementById('uploadProgress');
            if (progress) progress.style.display = 'block';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(API + `/api/teams/${currentTeamId}/files`, {
                    method: 'POST',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                    body: formData,
                });
                const data = await res.json();
                if (data.error) { showToast(data.error); return; }
                showToast('File uploaded!');
                loadAndRenderFiles();
            } catch(e) {
                showToast('Upload failed');
            } finally {
                if (progress) progress.style.display = 'none';
            }
        });

        function downloadFile(fileId) {
            window.open(API + `/api/teams/${currentTeamId}/files/${fileId}/download?token=${token}`, '_blank');
        }

        function previewFile(fileId, fileName, contentType) {
            const url = API + `/api/teams/${currentTeamId}/files/${fileId}/download?token=${token}`;
            document.getElementById('deathModal').innerHTML = `
                <div style="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100" onclick="if(event.target===this)document.getElementById('deathModal').innerHTML=''">
                    <div class="card" style="width:700px;max-width:95vw;margin:0;max-height:90vh;overflow:auto">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                            <h3 style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(fileName)}</h3>
                            <button class="btn btn-sm" style="background:var(--bg-input);color:var(--text-muted)" onclick="document.getElementById('deathModal').innerHTML=''">✕</button>
                        </div>
                        <img src="${url}" style="max-width:100%;border-radius:8px" alt="${escapeHtml(fileName)}">
                    </div>
                </div>`;
        }

        const deleteFile = guard('deleteFile', async function(fileId) {
            await api('DELETE', `/api/teams/${currentTeamId}/files/${fileId}`);
            showToast('File deleted');
            loadAndRenderFiles();
        });

        // --- Match Scheduling ---

        let matchSearchTimeout = null;

        async function loadAndRenderMatches() {
            teamTab = 'matches';
            renderTeamView();
            const data = await api('GET', `/api/teams/${currentTeamId}/matches`);
            const el = document.getElementById('matchesContent');
            if (el) el.innerHTML = renderMatchesContent(data.matches || []);
        }

        function renderMatchesContent(matches) {
            const team = teamData.team;
            const canManage = team.my_role === 'leader' || team.my_role === 'officer';
            const myTeamId = currentTeamId;
            let html = '';

            // Challenge form
            if (canManage) {
                html += `
                    <div class="card">
                        <div class="collapsible-header" onclick="toggleSection('challengeForm', this)">
                            <h3>+ Send Challenge</h3>
                            <span class="toggle-arrow">&#9660;</span>
                        </div>
                        <div class="collapsible-body" id="challengeForm">
                            <div class="form-group" style="margin-top:12px">
                                <label>Search Team</label>
                                <input type="text" id="matchTeamSearch" placeholder="Type a team name..." oninput="searchTeamsForMatch(this.value)" autocomplete="off">
                                <div id="matchTeamResults" style="margin-top:4px"></div>
                                <input type="hidden" id="matchOpponentId">
                                <div id="matchSelectedTeam" style="margin-top:4px;font-size:0.85em;color:var(--accent);font-weight:600"></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Match Type</label>
                                    <select id="matchType" style="background:var(--bg-input);border:1px solid var(--border-input);color:var(--text);padding:10px;border-radius:8px">
                                        <option value="gvg">GvG</option>
                                        <option value="scrim">Scrim</option>
                                        <option value="raid">Raid</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Scheduled Time (optional)</label>
                                    <input type="datetime-local" id="matchTime" style="background:var(--bg-input);border:1px solid var(--border-input);color:var(--text);padding:10px;border-radius:8px">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Message (optional)</label>
                                <input type="text" id="matchMessage" placeholder="e.g. Best of 3, no items" maxlength="200">
                            </div>
                            <div><button class="btn btn-primary" onclick="sendChallenge()">Send Challenge</button></div>
                        </div>
                    </div>
                `;
            }

            // Incoming challenges
            const incoming = matches.filter(m => m.challenged_team_id === myTeamId && m.status === 'pending');
            if (incoming.length > 0) {
                html += '<div class="card"><h3 style="color:#f59e0b">Incoming Challenges (' + incoming.length + ')</h3>';
                for (const m of incoming) {
                    const time = m.scheduled_time ? new Date(m.scheduled_time).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'TBD';
                    html += `<div style="padding:10px;background:var(--bg-item);border-radius:8px;margin-bottom:8px;border-left:3px solid #f59e0b">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start">
                            <div>
                                <span style="font-weight:700">${escapeHtml(m.challenger_name)}</span>
                                <span class="event-type-badge ${m.match_type}" style="margin-left:4px">${m.match_type}</span>
                                <div style="font-size:0.8em;color:var(--text-muted);margin-top:2px">Scheduled: ${time}</div>
                                ${m.message ? `<div style="font-size:0.85em;color:var(--text-muted);margin-top:2px;font-style:italic">"${escapeHtml(m.message)}"</div>` : ''}
                            </div>
                            ${canManage ? `<div style="display:flex;gap:4px">
                                <button class="btn btn-sm" style="background:#065f46;color:#34d399;padding:4px 12px" onclick="respondMatch('${m.id}','accept')">Accept</button>
                                <button class="btn btn-sm" style="background:#7f1d1d;color:#ef4444;padding:4px 12px" onclick="respondMatch('${m.id}','decline')">Decline</button>
                            </div>` : ''}
                        </div>
                    </div>`;
                }
                html += '</div>';
            }

            // Accepted / upcoming matches
            const accepted = matches.filter(m => m.status === 'accepted');
            if (accepted.length > 0) {
                html += '<div class="card"><h3 style="color:#34d399">Upcoming Matches (' + accepted.length + ')</h3>';
                for (const m of accepted) {
                    const opponent = m.challenger_team_id === myTeamId ? m.challenged_name : m.challenger_name;
                    const time = m.scheduled_time ? new Date(m.scheduled_time).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'TBD';
                    html += `<div style="padding:10px;background:var(--bg-item);border-radius:8px;margin-bottom:8px;border-left:3px solid #34d399">
                        <div style="display:flex;justify-content:space-between;align-items:center">
                            <div>
                                <span style="font-weight:700">vs ${escapeHtml(opponent)}</span>
                                <span class="event-type-badge ${m.match_type}" style="margin-left:4px">${m.match_type}</span>
                                <div style="font-size:0.8em;color:var(--text-muted);margin-top:2px">${time}</div>
                            </div>
                            ${canManage ? `<div style="display:flex;gap:4px">
                                <button class="btn btn-secondary btn-sm" onclick="showResultModal('${m.id}','${escapeHtml(m.challenger_name)}','${escapeHtml(m.challenged_name)}')">Log Result</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteMatch('${m.id}')">X</button>
                            </div>` : ''}
                        </div>
                    </div>`;
                }
                html += '</div>';
            }

            // Outgoing pending
            const outgoing = matches.filter(m => m.challenger_team_id === myTeamId && m.status === 'pending');
            if (outgoing.length > 0) {
                html += '<div class="card"><h3>Pending Sent (' + outgoing.length + ')</h3>';
                for (const m of outgoing) {
                    const time = m.scheduled_time ? new Date(m.scheduled_time).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'TBD';
                    html += `<div class="dkp-row" style="padding:8px 0">
                        <div>
                            <span style="font-weight:600">vs ${escapeHtml(m.challenged_name)}</span>
                            <span class="event-type-badge ${m.match_type}" style="margin-left:4px">${m.match_type}</span>
                            <div style="font-size:0.75em;color:var(--text-dim)">${time} &middot; Waiting for response</div>
                        </div>
                        ${canManage ? `<button class="btn btn-danger btn-sm" onclick="deleteMatch('${m.id}')" style="font-size:0.7em">Cancel</button>` : ''}
                    </div>`;
                }
                html += '</div>';
            }

            // Completed / declined
            const past = matches.filter(m => m.status === 'completed' || m.status === 'declined');
            if (past.length > 0) {
                html += '<div class="card"><h3>Match History</h3>';
                for (const m of past) {
                    const opponent = m.challenger_team_id === myTeamId ? m.challenged_name : m.challenger_name;
                    const date = new Date(m.created_at * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                    if (m.status === 'declined') {
                        html += `<div class="dkp-row" style="padding:6px 0">
                            <span>vs ${escapeHtml(opponent)} <span class="event-type-badge ${m.match_type}">${m.match_type}</span></span>
                            <span style="color:#ef4444;font-size:0.85em">DECLINED &middot; ${date}</span>
                        </div>`;
                    } else {
                        const isWinner = m.winner_team_id === myTeamId;
                        const isDraw = m.winner_team_id === null && m.result_challenger !== null;
                        const resultColor = isWinner ? '#34d399' : isDraw ? '#f59e0b' : '#ef4444';
                        const resultText = isWinner ? 'WIN' : isDraw ? 'DRAW' : 'LOSS';
                        const score = m.result_challenger !== null ? `${m.result_challenger}-${m.result_challenged}` : '';

                        html += `<div class="dkp-row" style="padding:6px 0">
                            <span>vs ${escapeHtml(opponent)} ${score ? `<span style="color:var(--text-muted);font-size:0.85em">(${score})</span>` : ''} <span class="event-type-badge ${m.match_type}">${m.match_type}</span></span>
                            <span style="color:${resultColor};font-weight:700;font-size:0.85em">${resultText} &middot; ${date}</span>
                        </div>`;
                    }
                }
                html += '</div>';
            }

            if (matches.length === 0) {
                html += '<div class="card"><div class="empty-state">No matches yet — challenge another team!</div></div>';
            }

            return html;
        }

        function searchTeamsForMatch(query) {
            clearTimeout(matchSearchTimeout);
            if (query.length < 2) { document.getElementById('matchTeamResults').innerHTML = ''; return; }
            matchSearchTimeout = setTimeout(async () => {
                const data = await api('GET', `/api/teams/${currentTeamId}/search-teams?q=${encodeURIComponent(query)}`);
                const el = document.getElementById('matchTeamResults');
                if (!el) return;
                if (!data.teams || data.teams.length === 0) {
                    el.innerHTML = '<div style="font-size:0.8em;color:var(--text-dim);padding:4px">No teams found</div>';
                    return;
                }
                el.innerHTML = data.teams.map(t =>
                    `<div style="padding:6px 10px;background:var(--bg-item);border-radius:6px;margin-bottom:2px;cursor:pointer;font-size:0.9em" onclick="selectMatchOpponent('${t.id}','${escapeHtml(t.name)}')">${escapeHtml(t.name)}</div>`
                ).join('');
            }, 300);
        }

        function selectMatchOpponent(teamId, name) {
            document.getElementById('matchOpponentId').value = teamId;
            document.getElementById('matchSelectedTeam').textContent = 'Selected: ' + name;
            document.getElementById('matchTeamResults').innerHTML = '';
            document.getElementById('matchTeamSearch').value = name;
        }

        const sendChallenge = guard('sendChallenge', async function() {
            const opponentId = document.getElementById('matchOpponentId').value;
            if (!opponentId) return showToast('Search and select a team first');

            const timeInput = document.getElementById('matchTime').value;
            const data = await api('POST', `/api/teams/${currentTeamId}/matches`, {
                opponentTeamId: opponentId,
                matchType: document.getElementById('matchType').value,
                scheduledTime: timeInput ? new Date(timeInput).getTime() : null,
                message: document.getElementById('matchMessage').value.trim(),
            });
            if (data.error) { showToast(data.error); return; }
            showToast('Challenge sent!');
            loadAndRenderMatches();
        });

        const respondMatch = guard('respondMatch', async function(matchId, action) {
            await api('POST', `/api/teams/${currentTeamId}/matches/${matchId}/${action}`);
            showToast(action === 'accept' ? 'Challenge accepted!' : 'Challenge declined');
            loadAndRenderMatches();
        });

        function showResultModal(matchId, challengerName, challengedName) {
            document.getElementById('deathModal').innerHTML = `
                <div style="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100" onclick="if(event.target===this)document.getElementById('deathModal').innerHTML=''">
                    <div class="card" style="width:400px;max-width:90vw;margin:0">
                        <h2>Log Match Result</h2>
                        <div class="form-row" style="margin-top:12px">
                            <div class="form-group">
                                <label>${escapeHtml(challengerName)}</label>
                                <input type="number" id="resultChallenger" min="0" placeholder="Score">
                            </div>
                            <div class="form-group">
                                <label>${escapeHtml(challengedName)}</label>
                                <input type="number" id="resultChallenged" min="0" placeholder="Score">
                            </div>
                        </div>
                        <div style="display:flex;gap:8px;margin-top:12px">
                            <button class="btn btn-primary" onclick="submitMatchResult('${matchId}')">Submit</button>
                            <button class="btn" style="background:var(--bg-input);color:var(--text)" onclick="document.getElementById('deathModal').innerHTML=''">Cancel</button>
                        </div>
                    </div>
                </div>`;
        }

        const submitMatchResult = guard('submitMatchResult', async function(matchId) {
            const sc = document.getElementById('resultChallenger').value;
            const sd = document.getElementById('resultChallenged').value;
            if (sc === '' || sd === '') return showToast('Enter both scores');
            const data = await api('POST', `/api/teams/${currentTeamId}/matches/${matchId}/result`, {
                scoreChallenger: parseInt(sc), scoreChallenged: parseInt(sd),
            });
            if (data.error) { showToast(data.error); return; }
            document.getElementById('deathModal').innerHTML = '';
            showToast('Result logged!');
            loadAndRenderMatches();
        });

        const deleteMatch = guard('deleteMatch', async function(matchId) {
            await api('DELETE', `/api/teams/${currentTeamId}/matches/${matchId}`);
            loadAndRenderMatches();
        });

        function copyInvite(code) {
            navigator.clipboard.writeText(code);
            showToast('Invite code copied!');
        }

        function goHome() {
            if (currentUser) showTeamList();
            else showLogin();
        }

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>
</html>
